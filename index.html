<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Services Business OKRs - FY2025</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://alcdn.msauth.net/browser/2.39.0/js/msal-browser.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #f8f9fa;
  --card: #ffffff;
  --border: #e5e7eb;
  --text: #1f2937;
  --text2: #6b7280;
  --muted: #9ca3af;
  --green: #10b981;
  --green-bg: #d1fae5;
  --red: #ef4444;
  --red-bg: #fee2e2;
  --amber: #f59e0b;
  --amber-bg: #fef3c7;
  --blue: #3b82f6;
  --purple: #8b5cf6;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--text);
}

.header {
  background: var(--card);
  padding: 16px 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}

.header-left h1 { font-size: 22px; font-weight: 800; color: var(--text); }
.header-left p { font-size: 13px; color: var(--text2); margin-top: 2px; }

.header-right { display: flex; align-items: center; gap: 12px; }

.month-select {
  padding: 10px 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  background: var(--card);
  cursor: pointer;
}

.view-toggle { display: flex; background: #f3f4f6; border-radius: 8px; padding: 4px; }

.view-btn {
  padding: 8px 20px;
  border: none;
  background: transparent;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}

.view-btn.active { background: #065f46; color: white; }
.view-btn:hover:not(.active) { background: #e5e7eb; }

.nav {
  background: var(--card);
  padding: 0 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 4px;
  overflow-x: auto;
}

.nav-tab {
  padding: 16px 20px;
  border: none;
  background: transparent;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}

.nav-tab:hover { color: var(--text); background: #f9fafb; }
.nav-tab.active { color: #065f46; border-bottom-color: #065f46; background: #f0fdf4; }
.nav-tab svg { width: 18px; height: 18px; }

.view-label {
  background: var(--card);
  padding: 12px 32px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  color: var(--text2);
  text-align: right;
}

.main { padding: 24px 32px; max-width: 1600px; margin: 0 auto; }

.hero-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-bottom: 32px;
}

@media (max-width: 1400px) { .hero-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 768px) { .hero-grid { grid-template-columns: 1fr; } }

.hero-card {
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--border);
  overflow: hidden;
}

.hero-top { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }

.hero-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }

.hero-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  line-height: 1.3;
}

.hero-spark { width: 60px; height: 24px; }

.hero-value { font-size: 32px; font-weight: 800; color: var(--text); margin-bottom: 6px; }

.hero-target-line { font-size: 12px; color: var(--text2); margin-bottom: 12px; }

.hero-status { display: flex; align-items: center; justify-content: space-between; }

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
}

.status-badge.green { background: var(--green-bg); color: #065f46; }
.status-badge.red { background: var(--red-bg); color: #991b1b; }
.status-badge.amber { background: var(--amber-bg); color: #92400e; }
.status-badge::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: currentColor; }

.hero-pct { font-size: 13px; font-weight: 600; color: var(--text2); }

.hero-forecast { padding: 16px 20px; background: #fafafa; border-bottom: 1px solid var(--border); }

.forecast-row { display: flex; justify-content: space-between; margin-bottom: 12px; }

.forecast-item { text-align: left; }
.forecast-item:last-child { text-align: right; }

.forecast-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}

.forecast-value { font-size: 16px; font-weight: 700; color: var(--text); }
.forecast-value.behind { color: var(--red); }
.forecast-value.on-track { color: var(--green); }
.forecast-sub { font-size: 10px; color: var(--text2); }

.gap-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

.gap-label { font-size: 11px; font-weight: 600; color: var(--text2); }
.gap-value { font-size: 14px; font-weight: 700; color: var(--red); }
.gap-value.positive { color: var(--green); }

.hero-subs { padding: 16px 20px; }

.sub-metric { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.sub-metric:last-child { margin-bottom: 0; }

.sub-left { flex: 1; margin-right: 16px; }
.sub-label { font-size: 13px; color: var(--text2); margin-bottom: 4px; }

.sub-bar { height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; }
.sub-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.sub-fill.green { background: var(--green); }
.sub-fill.amber { background: var(--amber); }
.sub-fill.red { background: var(--red); }

.sub-right { text-align: right; min-width: 80px; }
.sub-value { font-size: 14px; font-weight: 700; color: var(--text); }
.sub-tgt { font-size: 11px; color: var(--text2); margin-top: 2px; }

.section-divider { display: flex; align-items: center; justify-content: center; margin: 40px 0 28px; }

.divider-text {
  padding: 10px 24px;
  background: #e5e7eb;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.okr-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px; }
@media (max-width: 1200px) { .okr-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 768px) { .okr-grid { grid-template-columns: 1fr; } }

.okr-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }

.okr-header { padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
.okr-header.blue { background: #1e3a5f; }
.okr-header.teal { background: #0d9488; }
.okr-header.green { background: #065f46; }
.okr-header.orange { background: #9a3412; }

.okr-num { background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; color: white; }
.okr-title { font-size: 14px; font-weight: 600; color: white; }

.okr-metrics { padding: 16px 20px; }

.okr-metric {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.okr-metric:last-child { border-bottom: none; }

.okr-metric-left { flex: 1; }
.okr-metric-label { font-size: 13px; color: var(--text2); margin-bottom: 6px; }
.okr-metric-bar { height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; max-width: 200px; }
.okr-metric-fill { height: 100%; border-radius: 3px; }

.okr-metric-right { text-align: right; margin-left: 16px; }
.okr-metric-value { font-size: 16px; font-weight: 700; color: var(--text); }
.okr-metric-target { font-size: 11px; color: var(--muted); }

.okr-metric-status {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 4px;
  margin-top: 4px;
  display: inline-block;
}
.okr-metric-status.green { background: var(--green-bg); color: #065f46; }
.okr-metric-status.amber { background: var(--amber-bg); color: #92400e; }
.okr-metric-status.red { background: var(--red-bg); color: #991b1b; }

.deal-section { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 20px; }

.deal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.deal-title { font-size: 15px; font-weight: 700; color: var(--text); }
.deal-total { font-size: 14px; font-weight: 700; color: var(--green); }

.deal-table { width: 100%; border-collapse: collapse; }
.deal-table th {
  text-align: left;
  padding: 12px 20px;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  background: #f9fafb;
  border-bottom: 1px solid var(--border);
}
.deal-table td { padding: 12px 20px; font-size: 13px; border-bottom: 1px solid var(--border); }
.deal-table tr:last-child td { border-bottom: none; }
.deal-table tr:hover td { background: #f9fafb; }

.deal-client { font-weight: 600; color: var(--text); }
.deal-scope { color: var(--text2); max-width: 280px; }
.deal-amt { font-weight: 700; font-family: 'JetBrains Mono', monospace; }

.prob-badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.prob-badge.high { background: var(--green-bg); color: #065f46; }
.prob-badge.med { background: var(--amber-bg); color: #92400e; }
.prob-badge.low { background: var(--red-bg); color: #991b1b; }

/* ===== SHAREPOINT AUTH ===== */
.auth-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 16px; border-radius: 8px; border: 1px solid #d1d5db;
  background: white; font-family: inherit; font-size: 13px; font-weight: 600;
  color: #374151; cursor: pointer; transition: all 0.2s;
}
.auth-btn:hover { background: #f9fafb; border-color: #9ca3af; }
.auth-btn svg { width: 16px; height: 16px; }

.user-info { display: flex; align-items: center; gap: 10px; }

.data-badge {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
}
.data-badge.live { background: #d1fae5; color: #065f46; }
.data-badge.embedded { background: #fef3c7; color: #92400e; }
.data-badge::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

.refresh-btn {
  padding: 7px 12px; border-radius: 6px; border: 1px solid #d1d5db;
  background: white; font-family: inherit; font-size: 12px; font-weight: 600;
  color: #374151; cursor: pointer; transition: all 0.2s;
}
.refresh-btn:hover { background: #f0fdf4; border-color: #10b981; color: #065f46; }
.refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.signout-btn {
  padding: 7px 12px; border-radius: 6px; border: none;
  background: transparent; font-family: inherit; font-size: 12px;
  color: #6b7280; cursor: pointer;
}
.signout-btn:hover { color: #ef4444; }

.user-name { font-size: 13px; font-weight: 500; color: #374151; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.sync-label {
  font-size: 11px; color: #9ca3af; white-space: nowrap;
}

.upload-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 9px 16px; border-radius: 8px;
  border: 1.5px dashed #d1d5db;
  background: #f9fafb; font-family: inherit; font-size: 13px;
  font-weight: 600; color: #374151; cursor: pointer; transition: all 0.2s;
}
.upload-btn:hover { border-color: #065f46; background: #f0fdf4; color: #065f46; }
.upload-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

.local-badge { background: #ede9fe; color: #5b21b6; }

.drop-overlay {
  position: fixed; inset: 0; background: rgba(6,95,70,0.08);
  border: 3px dashed #065f46; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  z-index: 999; pointer-events: none;
  font-size: 22px; font-weight: 700; color: #065f46;
  gap: 12px;
}

.loading-overlay {
  position: fixed; inset: 0; background: rgba(255,255,255,0.85);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 1000; gap: 16px;
}
.loading-spinner {
  width: 40px; height: 40px; border: 3px solid #e5e7eb;
  border-top-color: #065f46; border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: #374151; font-weight: 500; }
</style>
</head>

  <div class="header-left">
    <h1>Services Business OKRs</h1>

<script>
// ===== SHAREPOINT / MSAL CONFIG =====
// SETUP REQUIRED: Replace CLIENT_ID with your Azure AD App Registration client ID.
// See README for instructions: https://github.com/ajoseph1990/services-okr-dashboard
const SP_CONFIG = {
  clientId: "YOUR_CLIENT_ID_HERE",           // Azure AD App Registration → Application (client) ID
  tenantId: "gep1.onmicrosoft.com",          // Your tenant (or use "common" for any org account)
  sharePointHost: "gep1.sharepoint.com",
  sitePath: "/sites/ResourcingPlanner",
  fileName: "GEP_Services_OKR_Data Updated.xlsx",
  sheets: {
    metrics:  "Monthly Metrics",
    deals:    "Deals",
    pipeline: "Pipeline",
    bonus:    "Bonus"
  }
};

let msalInstance = null;
let currentAccount = null;
let isLiveData = false;
let lastFileModified = null;   // ISO string from Graph API
let lastSyncTime = null;       // Date object of last successful sync
let pollIntervalId = null;
let syncLabelIntervalId = null;
const POLL_MS = 5 * 60 * 1000; // check for file changes every 5 minutes

function initMSAL() {
  if (SP_CONFIG.clientId === "YOUR_CLIENT_ID_HERE") return;
  try {
    msalInstance = new msal.PublicClientApplication({
      auth: {
        clientId: SP_CONFIG.clientId,
        authority: `https://login.microsoftonline.com/${SP_CONFIG.tenantId}`,
        redirectUri: window.location.origin + window.location.pathname
      },
      cache: { cacheLocation: "sessionStorage" }
    });
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      currentAccount = accounts[0];
      showUserInfo(currentAccount);
      loadSharePointData();
    }
  } catch(e) {
    console.warn("MSAL init failed:", e);
  }
}

async function signIn() {
  if (!msalInstance) {
    alert("SharePoint is not configured yet.\n\nAn Azure AD App Registration is needed.\nSee README for setup instructions.");
    return;
  }
  try {
    const result = await msalInstance.loginPopup({
      scopes: ["User.Read", "Sites.Read.All", "Files.Read.All"]
    });
    currentAccount = result.account;
    showUserInfo(currentAccount);
    await loadSharePointData();
  } catch(e) {
    if (!e.message?.includes("user_cancelled")) alert("Sign in failed: " + e.message);
  }
}

async function signOut() {
  if (!msalInstance) return;
  stopPolling();
  await msalInstance.logoutPopup({ account: currentAccount });
  currentAccount = null; isLiveData = false; lastFileModified = null; lastSyncTime = null;
  document.getElementById("authArea").innerHTML = `
    <button class="auth-btn" onclick="signIn()">
      <svg viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg" width="16" height="16"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
      Connect to SharePoint
    </button>`;
  Object.assign(EMBEDDED_DATA, _ORIGINAL_EMBEDDED_DATA);
  init();
}

// ---- UI helpers ----

function showUserInfo(account) {
  const name = account.name || account.username;
  document.getElementById("authArea").innerHTML = `
    <div class="user-info">
      <span class="data-badge ${isLiveData ? 'live' : 'embedded'}" id="dataBadge">
        ${isLiveData ? 'Live Data' : 'Connecting...'}
      </span>
      <span class="sync-label" id="syncLabel"></span>
      <button class="refresh-btn" id="refreshBtn" onclick="loadSharePointData(false)">↻ Refresh</button>
      <span class="user-name" title="${name}">${name}</span>
      <button class="signout-btn" onclick="signOut()">Sign out</button>
    </div>`;

}

function updateSyncLabel() {
  const el = document.getElementById("syncLabel");
  if (!el) return;
  if (!lastSyncTime) { el.textContent = ""; return; }
  const mins = Math.floor((Date.now() - lastSyncTime.getTime()) / 60000);
  el.textContent = mins < 1 ? "Synced just now" : `Synced ${mins}m ago`;
}

function flashUpdated() {
  const el = document.getElementById("dataBadge");
  if (!el) return;
  el.textContent = "✓ Updated!";
  el.style.background = "#bfdbfe"; el.style.color = "#1e3a8a";
  setTimeout(() => {
    el.className = "data-badge live";
    el.textContent = "Live Data";
    el.style.background = ""; el.style.color = "";
  }, 3000);
}

// ---- Polling ----

function startPolling() {
  stopPolling();
  pollIntervalId = setInterval(() => checkForUpdates(), POLL_MS);
  syncLabelIntervalId = setInterval(() => updateSyncLabel(), 60000);
}

function stopPolling() {
  if (pollIntervalId)    { clearInterval(pollIntervalId);    pollIntervalId = null; }
  if (syncLabelIntervalId) { clearInterval(syncLabelIntervalId); syncLabelIntervalId = null; }
}

async function checkForUpdates() {
  if (!currentAccount || !lastFileModified) return;
  try {
    const token = await getGraphToken();
    const site = await graphGet(token, `/sites/${SP_CONFIG.sharePointHost}:${SP_CONFIG.sitePath}`);
    const search = await graphGet(token, `/sites/${site.id}/drive/root/search(q='${encodeURIComponent(SP_CONFIG.fileName)}')`);
    const fileItem = search.value?.find(f => f.name === SP_CONFIG.fileName || f.name.includes("GEP_Services_OKR_Data"));
    if (!fileItem) return;
    const serverModified = fileItem.lastModifiedDateTime;
    if (serverModified !== lastFileModified) {
      console.log("SharePoint file changed — reloading data...");
      await loadSharePointData(true); // silent = true (no loading overlay)
    }
  } catch(e) {
    console.warn("Auto-check failed:", e.message);
  }
}

// ---- Graph API ----

async function getGraphToken() {
  const result = await msalInstance.acquireTokenSilent({
    scopes: ["https://graph.microsoft.com/Sites.Read.All", "https://graph.microsoft.com/Files.Read.All"],
    account: currentAccount
  }).catch(() => msalInstance.acquireTokenPopup({
    scopes: ["https://graph.microsoft.com/Sites.Read.All", "https://graph.microsoft.com/Files.Read.All"]
  }));
  return result.accessToken;
}

async function graphGet(token, path) {
  const res = await fetch(`https://graph.microsoft.com/v1.0${path}`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  if (!res.ok) throw new Error(`Graph API ${path} → ${res.status}`);
  return res.json();
}

async function readSheet(token, driveId, itemId, sheetName) {
  const data = await graphGet(token, `/drives/${driveId}/items/${itemId}/workbook/worksheets('${encodeURIComponent(sheetName)}')/usedRange`);
  const [headers, ...rows] = data.values;
  return rows
    .filter(r => r.some(c => c !== null && c !== ""))
    .map(r => {
      const obj = {};
      headers.forEach((h, i) => { if (h) obj[String(h).trim()] = r[i] ?? null; });
      return obj;
    });
}

// ---- Main data loader ----
// silent=false  → show full loading overlay (manual refresh / first load)
// silent=true   → no overlay, background auto-update

async function loadSharePointData(silent = false) {
  const refreshBtn = document.getElementById("refreshBtn");
  if (refreshBtn) refreshBtn.disabled = true;
  const wasAlreadyLive = isLiveData;
  if (!silent) showLoading("Connecting to SharePoint...");

  try {
    const token = await getGraphToken();

    if (!silent) showLoading("Locating SharePoint site...");
    const site = await graphGet(token, `/sites/${SP_CONFIG.sharePointHost}:${SP_CONFIG.sitePath}`);

    if (!silent) showLoading("Finding Excel file...");
    const search = await graphGet(token, `/sites/${site.id}/drive/root/search(q='${encodeURIComponent(SP_CONFIG.fileName)}')`);
    const fileItem = search.value?.find(f => f.name === SP_CONFIG.fileName || f.name.includes("GEP_Services_OKR_Data"));
    if (!fileItem) throw new Error(`File "${SP_CONFIG.fileName}" not found in SharePoint.`);

    const driveId = fileItem.parentReference?.driveId;
    const itemId  = fileItem.id;
    lastFileModified = fileItem.lastModifiedDateTime;

    if (!silent) showLoading("Reading Excel data...");
    const [metricsRows, dealsRows, pipelineRows, bonusRows] = await Promise.all([
      readSheet(token, driveId, itemId, SP_CONFIG.sheets.metrics),
      readSheet(token, driveId, itemId, SP_CONFIG.sheets.deals),
      readSheet(token, driveId, itemId, SP_CONFIG.sheets.pipeline),
      readSheet(token, driveId, itemId, SP_CONFIG.sheets.bonus)
    ]);

    // Parse forecasts from column P ("Forecast" column) on each metric row
    const parseNum = v => (v === null || v === "" || v === undefined) ? undefined : parseFloat(v) || 0;
    const forecasts = {};
    metricsRows
      .filter(r => r.Metric && !String(r.Metric).startsWith("MTD Target"))
      .forEach(r => {
        const fv = parseNum(r["Forecast"]);
        if (fv != null && fv > 0) forecasts[String(r.Metric).trim()] = fv;
      });

    EMBEDDED_DATA.metrics = metricsRows
      .filter(r => r.Metric)
      .map(r => {
        const obj = { Metric: String(r.Metric).trim() };
        if (r["Annual Target"] != null) obj["Annual Target"] = parseNum(r["Annual Target"]);
        ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"].forEach(m => {
          if (r[m] != null) obj[m] = parseNum(r[m]);
        });
        if (r.YTD != null) obj.YTD = parseNum(r.YTD);
        return obj;
      });
    const dealsSLCol    = detectSLCol(dealsRows);
    const pipelineSLCol = detectSLCol(pipelineRows);
    const bonusSLCol    = detectSLCol(bonusRows);

    EMBEDDED_DATA.deals = dealsRows.map(r => ({
      Month: String(r.Month || ""), Client: String(r.Client || ""),
      Type: String(r.Type || ""), Scope: String(r.Scope || ""),
      "ACV ($M)": parseNum(r["ACV ($M)"]) || 0,
      ServiceLine: getSL(r, dealsSLCol)
    }));
    EMBEDDED_DATA.pipeline = pipelineRows.map(r => ({
      Client: String(r.Client || ""), Scope: String(r.Scope || ""),
      "ACV ($M)": parseNum(r["ACV ($M)"]) || 0,
      "Weighted ACV ($M)": parseNum(r["Weighted ACV ($M)"]) || 0,
      "Probability (H/M/L)": String(r["Probability (H/M/L)"] || r.Probability || "Low"),
      ServiceLine: getSL(r, pipelineSLCol)
    }));
    EMBEDDED_DATA.bonus = bonusRows.map(r => ({
      Client: String(r.Client || ""),
      "Estimated Bonus ($M)": parseNum(r["Estimated Bonus ($M)"]) || 0,
      "Probability (H/M/L)": String(r["Probability (H/M/L)"] || r.Probability || "Low"),
      ServiceLine: getSL(r, bonusSLCol)
    }));
    EMBEDDED_DATA.forecasts = forecasts;

    isLiveData = true;
    lastSyncTime = new Date();
    hideLoading();
    showUserInfo(currentAccount);
    if (refreshBtn) refreshBtn.disabled = false;
    if (wasAlreadyLive && silent) flashUpdated(); // pulse only on auto-update, not first load
    init();
    startPolling(); // (re)start polling after every successful load

  } catch(err) {
    hideLoading();
    console.error("SharePoint load error:", err);
    if (refreshBtn) refreshBtn.disabled = false;
    const errEl = document.createElement("span");
    errEl.style.cssText = "color:#ef4444;font-size:12px;margin-left:8px";
    errEl.textContent = "⚠ " + (err.message || String(err));
    const area = document.getElementById("authArea");
    if (area) { const old = area.querySelector(".err-msg"); if(old) old.remove(); errEl.className="err-msg"; area.appendChild(errEl); }
  }
}

function showLoading(text) {
  document.getElementById("loadingText").textContent = text;
  document.getElementById("loadingOverlay").style.display = "flex";
}
function hideLoading() {
  document.getElementById("loadingOverlay").style.display = "none";
}

// ===== LOCAL EXCEL FILE LOADER =====

// Drag-and-drop support on the whole window
window.addEventListener("dragover", e => {
  if ([...e.dataTransfer.items].some(i => i.kind === "file")) {
    e.preventDefault();
    document.getElementById("dropOverlay").style.display = "flex";
  }
});
window.addEventListener("dragleave", e => {
  if (!e.relatedTarget) document.getElementById("dropOverlay").style.display = "none";
});
window.addEventListener("drop", e => {
  e.preventDefault();
  document.getElementById("dropOverlay").style.display = "none";
  const file = e.dataTransfer.files[0];
  if (file) parseLocalExcel(file);
});

function handleFileInput(e) {
  const file = e.target.files[0];
  if (file) parseLocalExcel(file);
  e.target.value = ""; // reset so same file can be re-loaded
}

function parseLocalExcel(file) {
  if (!file.name.match(/\.xlsx?$/i)) {
    alert("Please load an .xlsx or .xls file.");
    return;
  }
  showLoading("Parsing " + file.name + "...");
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type: "array", cellDates: true });

      const sheetNames = {
        metrics:  SP_CONFIG.sheets.metrics,
        deals:    SP_CONFIG.sheets.deals,
        pipeline: SP_CONFIG.sheets.pipeline,
        bonus:    SP_CONFIG.sheets.bonus
      };

      function readWbSheet(name) {
        const ws = wb.Sheets[name];
        if (!ws) throw new Error(`Sheet "${name}" not found in ${file.name}.`);
        return XLSX.utils.sheet_to_json(ws, { defval: null });
      }

      const metricsRows  = readWbSheet(sheetNames.metrics);
      const dealsRows    = readWbSheet(sheetNames.deals);
      const pipelineRows = readWbSheet(sheetNames.pipeline);
      const bonusRows    = readWbSheet(sheetNames.bonus);

      applyParsedData(metricsRows, dealsRows, pipelineRows, bonusRows);

      hideLoading();
      stopPolling();                       // no polling for local files
      lastFileModified = null;
      lastSyncTime = new Date();

      // Show local file badge in authArea (only if not already signed into SharePoint)
      if (!isLiveData) {
        const area = document.getElementById("authArea");
        area.innerHTML = `
          <div class="user-info">
            <span class="data-badge local-badge">📂 Local File</span>
            <span class="sync-label" id="syncLabel">Loaded ${file.name}</span>
            <button class="upload-btn" onclick="document.getElementById('xlsxFileInput').click()" style="padding:7px 12px;border-radius:6px;font-size:12px">↺ Reload</button>
            <button class="signout-btn" onclick="clearLocalFile()">✕ Clear</button>
          </div>`;
      }

      init();
    } catch(err) {
      hideLoading();
      alert("Failed to parse Excel file:\n" + err.message);
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

// Find the column whose VALUES are service-line labels (MS / Consulting / Strategy / Managed Services).
// Score every column by how many of its rows contain a known label — pick the highest scorer.
// This is purely value-based so the column header name doesn't matter at all.
function detectSLCol(rows) {
  if (!rows || !rows.length) return null;
  const isSlVal = v => {
    const s = String(v || "").toLowerCase().trim();
    return s === "ms" || s === "consulting" || s === "strategy" ||
           s === "managed services" || s === "managed service" ||
           s.startsWith("managed");
  };
  let bestCol = null, bestScore = 0;
  for (const k of Object.keys(rows[0])) {
    const score = rows.reduce((n, r) => n + (isSlVal(r[k]) ? 1 : 0), 0);
    if (score > bestScore) { bestScore = score; bestCol = k; }
  }
  return bestScore > 0 ? bestCol : null;
}

function getSL(r, col) {
  if (!col) return "";
  return String(r[col] || "").trim();
}

function applyParsedData(metricsRows, dealsRows, pipelineRows, bonusRows) {
  const parseNum = v => (v === null || v === "" || v === undefined) ? undefined : parseFloat(v) || 0;

  // Read forecasts from column P ("Forecast" column) on each metric row
  const forecasts = {};
  metricsRows
    .filter(r => r.Metric && !String(r.Metric).startsWith("MTD Target"))
    .forEach(r => {
      const fv = parseNum(r["Forecast"]);
      if (fv != null && fv > 0) forecasts[String(r.Metric).trim()] = fv;
    });

  EMBEDDED_DATA.metrics = metricsRows
    .filter(r => r.Metric)
    .map(r => {
      const obj = { Metric: String(r.Metric).trim() };
      if (r["Annual Target"] != null) obj["Annual Target"] = parseNum(r["Annual Target"]);
      ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"].forEach(m => {
        if (r[m] != null) obj[m] = parseNum(r[m]);
      });
      if (r.YTD != null) obj.YTD = parseNum(r.YTD);
      return obj;
    });

  const dealsSLCol    = detectSLCol(dealsRows);
  const pipelineSLCol = detectSLCol(pipelineRows);
  const bonusSLCol    = detectSLCol(bonusRows);

  EMBEDDED_DATA.deals = dealsRows.map(r => ({
    Month: String(r.Month || ""), Client: String(r.Client || ""),
    Type: String(r.Type || ""), Scope: String(r.Scope || ""),
    "ACV ($M)": parseNum(r["ACV ($M)"]) || 0,
    ServiceLine: getSL(r, dealsSLCol)
  }));

  EMBEDDED_DATA.pipeline = pipelineRows.map(r => ({
    Client: String(r.Client || ""), Scope: String(r.Scope || ""),
    "ACV ($M)": parseNum(r["ACV ($M)"]) || 0,
    "Weighted ACV ($M)": parseNum(r["Weighted ACV ($M)"]) || 0,
    "Probability (H/M/L)": String(r["Probability (H/M/L)"] || r.Probability || "Low"),
    ServiceLine: getSL(r, pipelineSLCol)
  }));

  EMBEDDED_DATA.bonus = bonusRows.map(r => ({
    Client: String(r.Client || ""),
    "Estimated Bonus ($M)": parseNum(r["Estimated Bonus ($M)"]) || 0,
    "Probability (H/M/L)": String(r["Probability (H/M/L)"] || r.Probability || "Low"),
    ServiceLine: getSL(r, bonusSLCol)
  }));

  EMBEDDED_DATA.forecasts = forecasts;

  // Debug: show detected columns and unique ServiceLine values so we can confirm detection
  const uniq = arr => [...new Set(arr.map(x => x.ServiceLine))].filter(Boolean);
  const dbg = [
    `Deals SL col: "${dealsSLCol}" → values: [${uniq(EMBEDDED_DATA.deals).join(", ")}]`,
    `Pipeline SL col: "${pipelineSLCol}" → values: [${uniq(EMBEDDED_DATA.pipeline).join(", ")}]`,
    `Bonus SL col: "${bonusSLCol}" → values: [${uniq(EMBEDDED_DATA.bonus).join(", ")}]`
  ].join("\n");
  console.log("[SL Debug]\n" + dbg);
  let dbgEl = document.getElementById("slDebug");
  if (!dbgEl) {
    dbgEl = document.createElement("div");
    dbgEl.id = "slDebug";
    dbgEl.style.cssText = "position:fixed;bottom:8px;left:8px;background:#1e293b;color:#94a3b8;font:11px/1.5 monospace;padding:8px 12px;border-radius:8px;z-index:9999;max-width:600px;white-space:pre;opacity:0.92;cursor:pointer";
    dbgEl.title = "Click to dismiss";
    dbgEl.onclick = () => dbgEl.remove();
    document.body.appendChild(dbgEl);
  }
  dbgEl.textContent = dbg;
}

function clearLocalFile() {
  Object.assign(EMBEDDED_DATA, JSON.parse(JSON.stringify(_ORIGINAL_EMBEDDED_DATA)));
  document.getElementById("authArea").innerHTML = `
    <button class="auth-btn" onclick="signIn()">
      <svg viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg" width="16" height="16"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
      Connect to SharePoint
    </button>`;
  init();
}

<script>
// ===== DEFAULT DATA — load your Excel file to populate =====
const EMBEDDED_DATA = {
  metrics: [],
  forecasts: {},
  deals: [],
  pipeline: [],
  bonus: []
};

// ===== GLOBAL STATE =====
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
let activeTab = "overview";
let viewMode = "YTD";
let currentMonth = 1; // Feb

const ANN_TGT = {
  revTotal: 345, revStrategy: 10, revConsulting: 100, revMS: 235, consultingNew: 30,
  acvTotal: 175, acvNewLogo: 65, acvUpsell: 110, pipelineCarry: 15,
  marginOverall: 30, util: 84, conM: 42, conU: 82, msM: 27, msU: 88, msRenewal: 75,
  agents: 5000, arr: 10, aiEff: 20,
  csat: 5, esat: 5, vol: 15, reg: 7, mgr: 90, lat: 50, div: 80,
  scRev: 10, scPipe: 15, scCust: 5, scThought: 5
};

let DATA = null;

// ===== INIT =====
function init() {
  DATA = { 
    metrics: {}, 
    mtdTargets: {}, 
    ytdValues: {},
    forecasts: EMBEDDED_DATA.forecasts || {},
    deals: EMBEDDED_DATA.deals, 
    pipeline: EMBEDDED_DATA.pipeline,
    bonus: EMBEDDED_DATA.bonus || []
  };
  
  EMBEDDED_DATA.metrics.forEach(row => {
    const metric = row.Metric;
    if (metric.startsWith("MTD Target -")) {
      const baseName = metric.replace("MTD Target - ", "").trim();
      DATA.mtdTargets[baseName] = {};
      MONTHS.forEach(m => { if (row[m] !== undefined) DATA.mtdTargets[baseName][m] = row[m]; });
      DATA.mtdTargets[baseName].YTD = row.YTD || 0;
    } else {
      DATA.metrics[metric] = { values: {}, target: row["Annual Target"], ytd: row.YTD || 0 };
      MONTHS.forEach(m => { DATA.metrics[metric].values[m] = row[m] || 0; });

  });
  
  const monthSel = document.getElementById("monthSel");

  render();
}

// ===== HELPERS =====
function getVal(name, months) {
  if (!DATA?.metrics[name]) return 0;
  return months.reduce((s, m) => s + (DATA.metrics[name].values[m] || 0), 0);
}

function getYTD(name) {
  if (!DATA?.metrics[name]) return 0;
  return DATA.metrics[name].ytd || 0;
}

function getForecast(name) {
  return DATA?.forecasts[name] || 0;
}

function getAvg(name, months) {
  if (!DATA?.metrics[name]) return 0;
  const vals = months.map(m => DATA.metrics[name].values[m] || 0).filter(v => v > 0);
  return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
}

function getMTD(name, month) { return DATA?.mtdTargets[name]?.[month] || null; }
function getMTDYTD(name) { return DATA?.mtdTargets[name]?.YTD || null; }

function getMonths() {
  if (viewMode === "MTD") return [MONTHS[currentMonth]];
  return MONTHS.slice(0, currentMonth + 1);
}

function compute(months) {
  const useYTD = viewMode === "YTD";
  const useForecast = viewMode === "FORECAST";
  
  return {
    rev: {
      total: useYTD ? getYTD("Rev Total ($M)") : getVal("Rev Total ($M)", months),
      strategy: useYTD ? getYTD("Rev Strategy ($M)") : getVal("Rev Strategy ($M)", months),

      ms: useYTD ? getYTD("Rev MS ($M)") : getVal("Rev MS ($M)", months),
      consultingNew: useYTD ? getYTD("Consulting New Offerings %") : (viewMode === "MTD" ? getVal("Consulting New Offerings %", months) : getAvg("Consulting New Offerings %", months)),
      // Forecasts
      forecastTotal: getForecast("Rev Total ($M)"),
      forecastStrategy: getForecast("Rev Strategy ($M)"),
      forecastConsulting: getForecast("Rev Consulting ($M)"),
      forecastMS: getForecast("Rev MS ($M)")
    },
    acv: {
      total: useYTD ? getYTD("ACV Total ($M)") : getVal("ACV Total ($M)", months),
      newLogo: useYTD ? getYTD("ACV New Logos ($M)") : getVal("ACV New Logos ($M)", months),
      upsell: useYTD ? getYTD("ACV Upsell ($M)") : getVal("ACV Upsell ($M)", months),
      pipelineCarry: useYTD ? getYTD("Pipeline Carry %") : (viewMode === "MTD" ? getVal("Pipeline Carry %", months) : getAvg("Pipeline Carry %", months))
    },
    mg: {
      overall: useYTD ? getYTD("Margin Overall %") : (viewMode === "MTD" ? getVal("Margin Overall %", months) : getAvg("Margin Overall %", months)),
      util: useYTD ? getYTD("Utilization %") : (viewMode === "MTD" ? getVal("Utilization %", months) : getAvg("Utilization %", months)),
      conM: useYTD ? getYTD("Consulting Margin %") : (viewMode === "MTD" ? getVal("Consulting Margin %", months) : getAvg("Consulting Margin %", months)),

  };
}

function fmtM(v) { const n = +v.toFixed(2); return "$" + (n % 1 === 0 ? n.toFixed(0) : n.toFixed(1)) + "M"; }
function fmtK(v) { return "$" + (v * 1000).toFixed(0) + "K"; }

function filterBySL(arr, sl) {
  // If no row has a non-empty ServiceLine, column absent or undetected — show everything
  if (!arr.some(x => x.ServiceLine)) return arr;

  const s = sl.toLowerCase().trim();
  return arr.filter(x => {
    if (!x.ServiceLine) return false;
    const v = x.ServiceLine.toLowerCase().trim();
    if (s === "ms") return v === "ms" || v.startsWith("managed");
    if (s === "consulting") return v === "consulting";
    if (s === "strategy") return v === "strategy" || v.includes("strategy");
    return v.includes(s);
  });
}

function pctColor(pct, low = false) {
  if (low) return pct <= 100 ? "green" : pct <= 120 ? "amber" : "red";
  return pct >= 95 ? "green" : pct >= 80 ? "amber" : "red";
}

function statusText(pct, low = false) {
  if (low) return pct <= 100 ? "ON TRACK" : pct <= 120 ? "AT RISK" : "BEHIND";
  return pct >= 95 ? "ON TRACK" : pct >= 80 ? "AT RISK" : "BEHIND";
}

function sparkSVG(color) {
  const colors = { green: "#10b981", red: "#ef4444", amber: "#f59e0b" };
  const c = colors[color] || colors.green;
  return `<svg class="hero-spark" viewBox="0 0 60 24"><path d="M0 20 L10 18 L20 15 L30 12 L40 8 L50 5 L60 2" fill="none" stroke="${c}" stroke-width="2"/></svg>`;
}

// ===== HERO CARD =====
function heroCard(opts) {
  const { label, value, actual, mtdTgt, ytdTgt, annTgt, forecast, unit, mIdx, subs, isAvg, low, isRevOrMargin, noPct } = opts;
  
  let target, pct, displayForecast, forecastLabel;
  
  if (viewMode === "MTD") {
    target = mtdTgt || (isAvg ? annTgt : annTgt / 12);
    pct = target ? (actual / target) * 100 : 0;
    displayForecast = forecast || (isAvg ? actual : (mIdx > 0 ? actual / (mIdx + 1) * 12 : actual * 12));
    forecastLabel = "Run-rate";
  } else if (viewMode === "YTD") {
    target = ytdTgt || (isAvg ? annTgt : annTgt * (mIdx + 1) / 12);
    pct = target ? (actual / target) * 100 : 0;
    displayForecast = forecast || (isAvg ? actual : (mIdx > 0 ? actual / (mIdx + 1) * 12 : actual * 12));
    forecastLabel = "Run-rate";
  } else {
    // FORECAST view - use the forecast value directly
    displayForecast = forecast || (isAvg ? actual : (mIdx > 0 ? actual / (mIdx + 1) * 12 : actual * 12));
    target = annTgt;
    pct = target ? (displayForecast / target) * 100 : 0;
    forecastLabel = "Forecast";
  }
  
  const color = pctColor(pct, low);
  const status = statusText(pct, low);
  
  const gap = displayForecast - annTgt;
  const gapStr = unit === "$M" ? (gap >= 0 ? "+" + fmtM(gap) : "-" + fmtM(Math.abs(gap))) :
                 unit === "%" ? (gap >= 0 ? "+" + gap.toFixed(1) + "%" : gap.toFixed(1) + "%") :
                 (gap >= 0 ? "+" + gap.toFixed(0) : gap.toFixed(0));
  
  const forecastStr = unit === "$M" ? fmtM(displayForecast) : unit === "%" ? displayForecast.toFixed(0) + "%" : displayForecast.toLocaleString();
  const annTgtStr = unit === "$M" ? fmtM(annTgt) : unit === "%" ? annTgt + "%" : annTgt.toLocaleString();
  
  // Build target line — noPct cards (utilization, renewal) omit "X% vs target"
  const fmtTgt = t => unit === "$M" ? fmtM(t) : t.toFixed(0) + (unit === "%" ? "%" : "");
  let targetLineStr;
  if (viewMode === "YTD") {
    targetLineStr = noPct
      ? `YTD target: ${fmtTgt(target)}`
      : `YTD target: ${fmtTgt(target)} · ${pct.toFixed(0)}% vs YTD target`;
  } else if (viewMode === "FORECAST") {
    if (isRevOrMargin) {
      targetLineStr = `Forecast: ${forecastStr} vs ${annTgtStr} Annual target`;
    } else {
      targetLineStr = noPct
        ? `Forecast: ${forecastStr}`
        : `Forecast: ${forecastStr} · ${pct.toFixed(0)}% vs Annual target`;
    }
  } else {
    targetLineStr = noPct
      ? `MTD target: ${fmtTgt(target)}`
      : `MTD target: ${fmtTgt(target)} · ${pct.toFixed(0)}% vs MTD target`;
  }
  
  let subsHtml = "";
  if (subs && subs.length) {
    subsHtml = subs.map(s => {
      const sPct = s.t ? Math.min((s.v / s.t) * 100, 100) : 0;
      const sColor = pctColor(s.t ? (s.v / s.t) * 100 : 0, s.low);
      let tgtFmt = "";
      if (s.t) {
        if (s.value.includes("%")) tgtFmt = s.t.toFixed(0) + "%";
        else if (s.value.endsWith("M")) tgtFmt = fmtM(s.t);
        else if (s.value.endsWith("K")) tgtFmt = fmtK(s.t);
        else tgtFmt = s.t.toFixed(1);
      }
      return `<div class="sub-metric">
        <div class="sub-left">
          <div class="sub-label">${s.label}</div>
          <div class="sub-bar"><div class="sub-fill ${sColor}" style="width:${sPct}%"></div></div>
        </div>
        <div class="sub-right">
          <div class="sub-value">${s.value}</div>
          ${tgtFmt ? `<div class="sub-tgt">Tgt: ${tgtFmt}</div>` : ""}
        </div>
      </div>`;
    }).join("");
  }
  
  // Don't show % badge for noPct cards, or in Forecast mode for rev/margin
  const showPct = !noPct && !(viewMode === "FORECAST" && isRevOrMargin);
  
  // Only show forecast/run-rate section in Forecast view
  const showForecastSection = viewMode === "FORECAST";
  
  // In FORECAST mode show the forecast figure prominently, not the YTD actual
  const displayValue = (viewMode === "FORECAST" && isRevOrMargin) ? forecastStr : value;

  return `<div class="hero-card">
    <div class="hero-top">
      <div class="hero-header">
        <div class="hero-label">${label}</div>
        ${sparkSVG(color)}
      </div>
      <div class="hero-value">${displayValue}</div>
      <div class="hero-target-line">${targetLineStr}</div>
      <div class="hero-status">
        <span class="status-badge ${color}">${status}</span>
        ${showPct ? `<span class="hero-pct">${pct.toFixed(0)}%</span>` : ''}
      </div>
    </div>
    ${showForecastSection ? `<div class="hero-forecast">
      <div class="forecast-row">
        <div class="forecast-item">
          <div class="forecast-label">${forecastLabel}</div>
          <div class="forecast-value">${forecastStr}</div>
          <div class="forecast-sub">${forecastLabel === "Forecast" ? "Updated" : "Projected"}</div>
        </div>
        <div class="forecast-item">
          <div class="forecast-label">Annual Tgt</div>
          <div class="forecast-value ${gap < 0 ? 'behind' : 'on-track'}">${annTgtStr}</div>
          <div class="forecast-sub">${gap < 0 ? 'BEHIND' : 'ON TRACK'}</div>
        </div>
      </div>
      <div class="gap-row">
        <span class="gap-label">GAP</span>
        <span class="gap-value ${gap >= 0 ? 'positive' : ''}">${gapStr}</span>
      </div>
    </div>` : ''}
    ${subsHtml ? `<div class="hero-subs">${subsHtml}</div>` : ''}
  </div>`;
}

// ===== OKR CARD =====
function okrCard(num, title, colorClass, metrics) {
  const metricsHtml = metrics.map(m => {
    const pct = m.tgt ? (m.val / m.tgt) * 100 : 0;
    const color = pctColor(pct, m.low);
    const status = statusText(pct, m.low);
    const valStr = m.unit === "$M" ? fmtK(m.val) : m.unit === "%" ? m.val.toFixed(1) + "%" : Number(m.val).toFixed(0);
    const tgtStr = m.unit === "$M" ? "/ " + fmtM(m.tgt) : m.unit === "%" ? "/ " + Number(m.tgt).toFixed(0) + "%" : "/ " + Number(m.tgt).toFixed(0);
    
    return `<div class="okr-metric">
      <div class="okr-metric-left">
        <div class="okr-metric-label">${m.label}</div>
        <div class="okr-metric-bar"><div class="okr-metric-fill" style="width:${Math.min(pct,100)}%;background:var(--${color})"></div></div>
      </div>
      <div class="okr-metric-right">
        <div class="okr-metric-value">${valStr} <span class="okr-metric-target">${tgtStr}</span></div>
        <div class="okr-metric-status ${color}">${status}</div>
      </div>
    </div>`;
  }).join("");
  
  return `<div class="okr-card">
    <div class="okr-header ${colorClass}">
      <span class="okr-num">${num}</span>
      <span class="okr-title">${title}</span>
    </div>
    <div class="okr-metrics">${metricsHtml}</div>
  </div>`;
}

// ===== DEAL SECTION WITH TOP 10 + OTHERS =====
function dealSection(deals, pipeline, bonus, showPipelineAndBonus = false) {
  let html = "";
  
  // CLOSED DEALS - Always show
  if (deals.length) {
    const total = deals.reduce((s, d) => s + (d["ACV ($M)"] || 0), 0);
    const sortedDeals = [...deals].sort((a, b) => (b["ACV ($M)"] || 0) - (a["ACV ($M)"] || 0));
    const top10 = sortedDeals.slice(0, 10);
    const others = sortedDeals.slice(10);
    const othersTotal = others.reduce((s, d) => s + (d["ACV ($M)"] || 0), 0);
    
    html += `<div class="deal-section">
      <div class="deal-header"><span class="deal-title">Closed Deals</span><span class="deal-total">${fmtM(total)} Total ACV</span></div>
      <table class="deal-table">
        <thead><tr><th>Client</th><th>Type</th><th>Scope</th><th>ACV</th></tr></thead>
        <tbody>
          ${top10.map(d => `<tr>
            <td class="deal-client">${d.Client}</td>
            <td>${d.Type}</td>
            <td class="deal-scope">${d.Scope}</td>
            <td class="deal-amt">${fmtM(d["ACV ($M)"] || 0)}</td>
          </tr>`).join("")}
          ${others.length > 0 ? `<tr style="background:#f9fafb;font-style:italic;">
            <td class="deal-client">Others (${others.length} deals)</td>
            <td>—</td>
            <td class="deal-scope">—</td>
            <td class="deal-amt">${fmtM(othersTotal)}</td>
          </tr>` : ''}
        </tbody>
      </table>
    </div>`;
  }
  
  // PIPELINE - Only in Forecast view
  if (showPipelineAndBonus && pipeline.length) {
    const total = pipeline.reduce((s, d) => s + (d["Weighted ACV ($M)"] || 0), 0);
    const sortedPipeline = [...pipeline].sort((a, b) => (b["Weighted ACV ($M)"] || 0) - (a["Weighted ACV ($M)"] || 0));
    const top10 = sortedPipeline.slice(0, 10);
    const others = sortedPipeline.slice(10);
    const othersTotal = others.reduce((s, d) => s + (d["Weighted ACV ($M)"] || 0), 0);
    const othersACV = others.reduce((s, d) => s + (d["ACV ($M)"] || 0), 0);
    
    html += `<div class="deal-section">
      <div class="deal-header"><span class="deal-title">Active Pipeline</span><span class="deal-total">${fmtM(total)} Weighted ACV</span></div>
      <table class="deal-table">
        <thead><tr><th>Client</th><th>Scope</th><th>ACV</th><th>Weighted</th><th>Prob</th></tr></thead>
        <tbody>
          ${top10.map(d => {
            const prob = (d["Probability (H/M/L)"] || "").toLowerCase();
            const cls = prob.includes("high") ? "high" : prob.includes("med") ? "med" : "low";
            return `<tr>
              <td class="deal-client">${d.Client}</td>
              <td class="deal-scope">${d.Scope}</td>
              <td class="deal-amt">${fmtM(d["ACV ($M)"] || 0)}</td>
              <td class="deal-amt">${fmtM(d["Weighted ACV ($M)"] || 0)}</td>
              <td><span class="prob-badge ${cls}">${d["Probability (H/M/L)"]}</span></td>
            </tr>`;
          }).join("")}
          ${others.length > 0 ? `<tr style="background:#f9fafb;font-style:italic;">
            <td class="deal-client">Others (${others.length} deals)</td>
            <td class="deal-scope">—</td>
            <td class="deal-amt">${fmtM(othersACV)}</td>
            <td class="deal-amt">${fmtM(othersTotal)}</td>
            <td>—</td>
          </tr>` : ''}
        </tbody>
      </table>
    </div>`;
  }
  
  // BONUS - Only in Forecast view
  if (showPipelineAndBonus && bonus && bonus.length) {
    const total = bonus.reduce((s, b) => s + (b["Estimated Bonus ($M)"] || 0), 0);
    const sortedBonus = [...bonus].sort((a, b) => (b["Estimated Bonus ($M)"] || 0) - (a["Estimated Bonus ($M)"] || 0));
    const top10 = sortedBonus.slice(0, 10);
    const others = sortedBonus.slice(10);
    const othersTotal = others.reduce((s, b) => s + (b["Estimated Bonus ($M)"] || 0), 0);
    
    html += `<div class="deal-section">
      <div class="deal-header"><span class="deal-title">Bonus Opportunities</span><span class="deal-total">${fmtM(total)} Total Potential</span></div>
      <table class="deal-table">
        <thead><tr><th>Client</th><th>Estimated Bonus</th><th>Probability</th></tr></thead>
        <tbody>
          ${top10.map(b => {
            const prob = (b["Probability (H/M/L)"] || "").toLowerCase();
            const cls = prob.includes("high") ? "high" : prob.includes("med") ? "med" : "low";
            return `<tr>
              <td class="deal-client">${b.Client}</td>
              <td class="deal-amt">${fmtM(b["Estimated Bonus ($M)"] || 0)}</td>
              <td><span class="prob-badge ${cls}">${b["Probability (H/M/L)"]}</span></td>
            </tr>`;
          }).join("")}
          ${others.length > 0 ? `<tr style="background:#f9fafb;font-style:italic;">
            <td class="deal-client">Others (${others.length} entries)</td>
            <td class="deal-amt">${fmtM(othersTotal)}</td>
            <td>—</td>
          </tr>` : ''}
        </tbody>
      </table>
    </div>`;
  }
  
  return html;
}

    }
  }
  
  if (activeTab === "consulting") {
    const conCols = viewMode === "FORECAST" ? 2 : 4;
    html += `<div class="hero-grid" style="grid-template-columns:repeat(${conCols},1fr)">
      ${heroCard({ label: "CONSULTING REVENUE", value: fmtM(d.rev.consulting), actual: d.rev.consulting, mtdTgt: getMTD("Rev Consulting ($M)", mName), ytdTgt: getMTDYTD("Rev Consulting ($M)"), annTgt: ANN_TGT.revConsulting, forecast: d.rev.forecastConsulting, unit: "$M", mIdx: currentMonth, isRevOrMargin: true })}
      ${heroCard({ label: "CONSULTING MARGIN", value: d.mg.conM.toFixed(0) + "%", actual: d.mg.conM, mtdTgt: getMTD("Consulting Margin %", mName) || 37, ytdTgt: getMTDYTD("Consulting Margin %") || 37, annTgt: ANN_TGT.conM, unit: "%", isAvg: true, mIdx: currentMonth, isRevOrMargin: true })}
      ${viewMode !== "FORECAST" ? heroCard({ label: "CONSULTING UTILIZATION", value: d.mg.conU.toFixed(0) + "%", actual: d.mg.conU, mtdTgt: getMTD("Consulting Util %", mName) || ANN_TGT.conU, ytdTgt: getMTDYTD("Consulting Util %") || ANN_TGT.conU, annTgt: ANN_TGT.conU, unit: "%", isAvg: true, mIdx: currentMonth, noPct: true }) : ''}
      ${viewMode !== "FORECAST" ? heroCard({ label: "ACV", value: fmtM(d.acv.newLogo), actual: d.acv.newLogo, mtdTgt: getMTD("ACV New Logos ($M)", mName), ytdTgt: getMTDYTD("ACV New Logos ($M)"), annTgt: ANN_TGT.acvNewLogo, unit: "$M", mIdx: currentMonth }) : ''}
    </div>`;
    html += `<div class="section-divider"><span class="divider-text">Deal Intelligence</span></div>`;
    html += dealSection(filterBySL(d.deals, "Consulting"), filterBySL(d.pipeline, "Consulting"), filterBySL(d.bonus, "Consulting"), viewMode === "FORECAST");
  }

  if (activeTab === "ms") {
    const msCols = viewMode === "FORECAST" ? 2 : 5;
    html += `<div class="hero-grid" style="grid-template-columns:repeat(${msCols},1fr)">
      ${heroCard({ label: "MS REVENUE", value: fmtM(d.rev.ms), actual: d.rev.ms, mtdTgt: getMTD("Rev MS ($M)", mName), ytdTgt: getMTDYTD("Rev MS ($M)"), annTgt: ANN_TGT.revMS, forecast: d.rev.forecastMS, unit: "$M", mIdx: currentMonth, isRevOrMargin: true })}
      ${heroCard({ label: "MS MARGIN", value: d.mg.msM.toFixed(0) + "%", actual: d.mg.msM, mtdTgt: getMTD("MS Margin %", mName) || 23, ytdTgt: getMTDYTD("MS Margin %") || 23, annTgt: ANN_TGT.msM, unit: "%", isAvg: true, mIdx: currentMonth, isRevOrMargin: true })}
      ${viewMode !== "FORECAST" ? heroCard({ label: "MS RENEWAL %", value: d.msRenewal.toFixed(0) + "%", actual: d.msRenewal, mtdTgt: getMTD("MS Renewal %", mName) || 60, ytdTgt: getMTDYTD("MS Renewal %") || 60, annTgt: ANN_TGT.msRenewal, unit: "%", isAvg: true, mIdx: currentMonth, noPct: true }) : ''}
      ${viewMode !== "FORECAST" ? heroCard({ label: "MS UTILIZATION", value: d.mg.msU.toFixed(0) + "%", actual: d.mg.msU, mtdTgt: getMTD("MS Util %", mName) || ANN_TGT.msU, ytdTgt: getMTDYTD("MS Util %") || ANN_TGT.msU, annTgt: ANN_TGT.msU, unit: "%", isAvg: true, mIdx: currentMonth, noPct: true }) : ''}
      ${viewMode !== "FORECAST" ? heroCard({ label: "MS ACV", value: fmtM(d.acv.total), actual: d.acv.total, mtdTgt: getMTD("ACV Total ($M)", mName), ytdTgt: getMTDYTD("ACV Total ($M)"), annTgt: ANN_TGT.acvTotal, unit: "$M", mIdx: currentMonth }) : ''}
    </div>`;
    html += `<div class="section-divider"><span class="divider-text">Deal Intelligence</span></div>`;
    html += dealSection(filterBySL(d.deals, "MS"), filterBySL(d.pipeline, "MS"), filterBySL(d.bonus, "MS"), viewMode === "FORECAST");
  }

  if (activeTab === "people") {
    // People tab does not have a forecast view — clamp to YTD
    const ppMode = viewMode === "FORECAST" ? "YTD" : viewMode;
    const ppMonths = ppMode === "MTD" ? [mName] : MONTHS.slice(0, currentMonth + 1);
    const pp = compute(ppMonths).pp;
    html += `<div class="hero-grid">
      ${heroCard({ label: "CSAT IMPROVEMENT", value: pp.csat.toFixed(1) + "%", actual: pp.csat, mtdTgt: 2, ytdTgt: getMTDYTD("CSAT %"), annTgt: ANN_TGT.csat, unit: "%", isAvg: true, mIdx: currentMonth })}
      ${heroCard({ label: "ESAT IMPROVEMENT", value: pp.esat.toFixed(1) + "%", actual: pp.esat, mtdTgt: 1.8, ytdTgt: getMTDYTD("ESAT %"), annTgt: ANN_TGT.esat, unit: "%", isAvg: true, mIdx: currentMonth })}
      ${heroCard({ label: "VOLUNTARY ATTRITION", value: pp.vol.toFixed(1) + "%", actual: pp.vol, mtdTgt: 15, ytdTgt: getMTDYTD("Voluntary Attrition %"), annTgt: ANN_TGT.vol, unit: "%", low: true, isAvg: true, mIdx: currentMonth })}
      ${heroCard({ label: "REGRETTABLE ATTRITION", value: pp.reg.toFixed(1) + "%", actual: pp.reg, mtdTgt: 7, ytdTgt: getMTDYTD("Regrettable Attrition %"), annTgt: ANN_TGT.reg, unit: "%", low: true, isAvg: true, mIdx: currentMonth })}
    </div>`;
    html += `<div class="hero-grid">
      ${heroCard({ label: "MGR RETENTION", value: pp.mgr.toFixed(0) + "%", actual: pp.mgr, mtdTgt: 88, ytdTgt: getMTDYTD("Mgr Retention %"), annTgt: ANN_TGT.mgr, unit: "%", isAvg: true, mIdx: currentMonth })}
      ${heroCard({ label: "LATERAL HIRE SUCCESS", value: pp.lat.toFixed(0) + "%", actual: pp.lat, mtdTgt: 48, ytdTgt: getMTDYTD("Lateral Hire Success %"), annTgt: ANN_TGT.lat, unit: "%", isAvg: true, mIdx: currentMonth })}
      ${heroCard({ label: "DIVERSITY SCORE", value: pp.div.toFixed(0) + "%", actual: pp.div, mtdTgt: 60, ytdTgt: getMTDYTD("Diversity Score %"), annTgt: ANN_TGT.div, unit: "%", isAvg: true, mIdx: currentMonth })}
    </div>`;
  }
  
  if (activeTab === "sc") {
    html += `<div class="hero-grid">
      ${heroCard({ label: "SC STRATEGY REVENUE", value: fmtM(d.sc.rev), actual: d.sc.rev, mtdTgt: 0.7, annTgt: ANN_TGT.scRev, unit: "$M", mIdx: currentMonth })}
      ${heroCard({ label: "WEIGHTED PIPELINE", value: fmtM(d.sc.pipe), actual: d.sc.pipe, mtdTgt: 1, annTgt: ANN_TGT.scPipe, unit: "$M", mIdx: currentMonth })}
      ${heroCard({ label: "REFERENCEABLE CUSTOMERS", value: d.sc.cust.toFixed(0), actual: d.sc.cust, mtdTgt: 1, annTgt: ANN_TGT.scCust, unit: "", mIdx: currentMonth })}
      ${heroCard({ label: "THOUGHT LEADERSHIP", value: d.sc.thought.toFixed(0), actual: d.sc.thought, mtdTgt: 1, annTgt: ANN_TGT.scThought, unit: "", mIdx: currentMonth })}
    </div>`;
    html += `<div class="section-divider"><span class="divider-text">SC Strategy OKR Detail</span></div>`;
    html += `<div class="okr-grid" style="grid-template-columns:1fr">
      ${okrCard("OKR 4", "Launch Supply Chain Strategy Practice", "orange", [
        { label: "SC Strategy Revenue", val: d.sc.rev, tgt: ANN_TGT.scRev * (currentMonth + 1) / 12, unit: "$M" },
        { label: "Weighted Pipeline", val: d.sc.pipe, tgt: ANN_TGT.scPipe * (currentMonth + 1) / 12, unit: "$M" },
        { label: "Referenceable Customers", val: d.sc.cust, tgt: ANN_TGT.scCust * (currentMonth + 1) / 12, unit: "" },
        { label: "Thought Leadership Pieces", val: d.sc.thought, tgt: ANN_TGT.scThought * (currentMonth + 1) / 12, unit: "" }
      ])}
    </div>`;
    html += `<div class="section-divider"><span class="divider-text">Deal Intelligence</span></div>`;
    html += dealSection(filterBySL(d.deals, "Strategy"), filterBySL(d.pipeline, "Strategy"), filterBySL(d.bonus, "Strategy"), viewMode === "FORECAST");
  }
  
  document.getElementById("main").innerHTML = html;
}
