<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Services Business OKRs - FY2025</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://alcdn.msauth.net/browser/2.39.0/js/msal-browser.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #f8f9fa;
  --card: #ffffff;
  --border: #e5e7eb;
  --text: #1f2937;
  --text2: #6b7280;
  --muted: #9ca3af;
  --green: #10b981;
  --green-bg: #d1fae5;
  --red: #ef4444;
  --red-bg: #fee2e2;
  --amber: #f59e0b;
  --amber-bg: #fef3c7;
  --blue: #3b82f6;
  --purple: #8b5cf6;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--text);
}

.header {
  background: var(--card);
  padding: 16px 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}

.header-left h1 { font-size: 22px; font-weight: 800; color: var(--text); }
.header-left p { font-size: 13px; color: var(--text2); margin-top: 2px; }

.header-right { display: flex; align-items: center; gap: 12px; }

.month-select {
  padding: 10px 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  background: var(--card);
  cursor: pointer;
}

.view-toggle { display: flex; background: #f3f4f6; border-radius: 8px; padding: 4px; }

.view-btn {
  padding: 8px 20px;
  border: none;
  background: transparent;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}

.view-btn.active { background: #065f46; color: white; }
.view-btn:hover:not(.active) { background: #e5e7eb; }

.nav {
  background: var(--card);
  padding: 0 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 4px;
  overflow-x: auto;
}

.nav-tab {
  padding: 16px 20px;
  border: none;
  background: transparent;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}

.nav-tab:hover { color: var(--text); background: #f9fafb; }
.nav-tab.active { color: #065f46; border-bottom-color: #065f46; background: #f0fdf4; }
.nav-tab svg { width: 18px; height: 18px; }

.view-label {
  background: var(--card);
  padding: 12px 32px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  color: var(--text2);
  text-align: right;
}

.main { padding: 24px 32px; max-width: 1600px; margin: 0 auto; }

.hero-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-bottom: 32px;
}

@media (max-width: 1400px) { .hero-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 768px) { .hero-grid { grid-template-columns: 1fr; } }

.hero-card {
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--border);
  overflow: hidden;
}

.hero-top { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }

.hero-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }

.hero-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  line-height: 1.3;
}

.hero-spark { width: 60px; height: 24px; }

.hero-value { font-size: 32px; font-weight: 800; color: var(--text); margin-bottom: 6px; }

.hero-target-line { font-size: 12px; color: var(--text2); margin-bottom: 12px; }

.hero-status { display: flex; align-items: center; justify-content: space-between; }

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
}

.status-badge.green { background: var(--green-bg); color: #065f46; }
.status-badge.red { background: var(--red-bg); color: #991b1b; }
.status-badge.amber { background: var(--amber-bg); color: #92400e; }
.status-badge.neutral { background: #f3f4f6; color: #6b7280; }
.status-badge::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: currentColor; }

.hero-pct { font-size: 13px; font-weight: 600; color: var(--text2); }

.hero-forecast { padding: 16px 20px; background: #fafafa; border-bottom: 1px solid var(--border); }

.forecast-row { display: flex; justify-content: space-between; margin-bottom: 12px; }

.forecast-item { text-align: left; }
.forecast-item:last-child { text-align: right; }

.forecast-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}

.forecast-value { font-size: 16px; font-weight: 700; color: var(--text); }
.forecast-value.behind { color: var(--red); }
.forecast-value.on-track { color: var(--green); }
.forecast-sub { font-size: 10px; color: var(--text2); }

.gap-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

.gap-label { font-size: 11px; font-weight: 600; color: var(--text2); }
.gap-value { font-size: 14px; font-weight: 700; color: var(--red); }
.gap-value.positive { color: var(--green); }

.hero-subs { padding: 16px 20px; }

.sub-metric { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.sub-metric:last-child { margin-bottom: 0; }

.sub-left { flex: 1; margin-right: 16px; }
.sub-label { font-size: 13px; color: var(--text2); margin-bottom: 4px; }

.sub-bar { height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; }
.sub-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.sub-fill.green { background: var(--green); }
.sub-fill.amber { background: var(--amber); }
.sub-fill.red { background: var(--red); }

.sub-right { text-align: right; min-width: 80px; }
.sub-value { font-size: 14px; font-weight: 700; color: var(--text); }
.sub-tgt { font-size: 11px; color: var(--text2); margin-top: 2px; }

.section-divider { display: flex; align-items: center; justify-content: center; margin: 40px 0 28px; }

.divider-text {
  padding: 10px 24px;
  background: #e5e7eb;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.okr-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px; }
@media (max-width: 1200px) { .okr-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 768px) { .okr-grid { grid-template-columns: 1fr; } }

.okr-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }

.okr-header { padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
.okr-header.blue { background: #1e3a5f; }
.okr-header.teal { background: #0d9488; }
.okr-header.green { background: #065f46; }
.okr-header.orange { background: #9a3412; }

.okr-num { background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; color: white; }
.okr-title { font-size: 14px; font-weight: 600; color: white; }

.okr-metrics { padding: 16px 20px; }

.okr-metric {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.okr-metric:last-child { border-bottom: none; }

.okr-metric-left { flex: 1; }
.okr-metric-label { font-size: 13px; color: var(--text2); margin-bottom: 6px; }
.okr-metric-bar { height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; max-width: 200px; }
.okr-metric-fill { height: 100%; border-radius: 3px; }

.okr-metric-right { text-align: right; margin-left: 16px; }
.okr-metric-value { font-size: 16px; font-weight: 700; color: var(--text); }
.okr-metric-target { font-size: 11px; color: var(--muted); }

.okr-metric-status {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 4px;
  margin-top: 4px;
  display: inline-block;
}
.okr-metric-status.green { background: var(--green-bg); color: #065f46; }
.okr-metric-status.amber { background: var(--amber-bg); color: #92400e; }
.okr-metric-status.red { background: var(--red-bg); color: #991b1b; }
.okr-metric-status.neutral { background: #f3f4f6; color: #6b7280; }

.deal-section { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 20px; }

.deal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.deal-title { font-size: 15px; font-weight: 700; color: var(--text); }
.deal-total { font-size: 14px; font-weight: 700; color: var(--green); }

.deal-table { width: 100%; border-collapse: collapse; }
.deal-table th {
  text-align: left;
  padding: 12px 20px;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  background: #f9fafb;
  border-bottom: 1px solid var(--border);
}
.deal-table td { padding: 12px 20px; font-size: 13px; border-bottom: 1px solid var(--border); }
.deal-table tr:last-child td { border-bottom: none; }
.deal-table tr:hover td { background: #f9fafb; }

.deal-client { font-weight: 600; color: var(--text); }
.deal-scope { color: var(--text2); max-width: 280px; }
.deal-amt { font-weight: 700; font-family: 'JetBrains Mono', monospace; }

.prob-badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.prob-badge.high { background: var(--green-bg); color: #065f46; }
.prob-badge.med { background: var(--amber-bg); color: #92400e; }
.prob-badge.low { background: var(--red-bg); color: #991b1b; }

/* ===== SHAREPOINT AUTH ===== */
.auth-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 16px; border-radius: 8px; border: 1px solid #d1d5db;
  background: white; font-family: inherit; font-size: 13px; font-weight: 600;
  color: #374151; cursor: pointer; transition: all 0.2s;
}
.auth-btn:hover { background: #f9fafb; border-color: #9ca3af; }
.auth-btn svg { width: 16px; height: 16px; }

.user-info { display: flex; align-items: center; gap: 10px; }

.data-badge {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
}
.data-badge.live { background: #d1fae5; color: #065f46; }
.data-badge.embedded { background: #fef3c7; color: #92400e; }
.data-badge::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

.refresh-btn {
  padding: 7px 12px; border-radius: 6px; border: 1px solid #d1d5db;
  background: white; font-family: inherit; font-size: 12px; font-weight: 600;
  color: #374151; cursor: pointer; transition: all 0.2s;
}
.refresh-btn:hover { background: #f0fdf4; border-color: #10b981; color: #065f46; }
.refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.signout-btn {
  padding: 7px 12px; border-radius: 6px; border: none;
  background: transparent; font-family: inherit; font-size: 12px;
  color: #6b7280; cursor: pointer;
}
.signout-btn:hover { color: #ef4444; }

.user-name { font-size: 13px; font-weight: 500; color: #374151; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.sync-label {
  font-size: 11px; color: #9ca3af; white-space: nowrap;
}

.upload-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 9px 16px; border-radius: 8px;
  border: 1.5px dashed #d1d5db;
  background: #f9fafb; font-family: inherit; font-size: 13px;
  font-weight: 600; color: #374151; cursor: pointer; transition: all 0.2s;
}
.upload-btn:hover { border-color: #065f46; background: #f0fdf4; color: #065f46; }
.upload-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

.local-badge { background: #ede9fe; color: #5b21b6; }

.drop-overlay {
  position: fixed; inset: 0; background: rgba(6,95,70,0.08);
  border: 3px dashed #065f46; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  z-index: 999; pointer-events: none;
  font-size: 22px; font-weight: 700; color: #065f46;
  gap: 12px;
}

.loading-overlay {
  position: fixed; inset: 0; background: rgba(255,255,255,0.85);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 1000; gap: 16px;
}
.loading-spinner {
  width: 40px; height: 40px; border: 3px solid #e5e7eb;
  border-top-color: #065f46; border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: #374151; font-weight: 500; }

/* ===== AI AGENT ===== */
.agent-fab {
  position: fixed; bottom: 28px; right: 28px; z-index: 1000;
  width: 52px; height: 52px; border-radius: 50%;
  background: #065f46; border: none; cursor: pointer;
  box-shadow: 0 4px 16px rgba(6,95,70,0.4);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s, box-shadow 0.2s;
}
.agent-fab:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(6,95,70,0.5); }
.agent-fab svg { color: white; width: 24px; height: 24px; }

.agent-panel {
  position: fixed; bottom: 92px; right: 28px; z-index: 1000;
  width: 400px; height: 560px;
  background: white; border-radius: 16px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.16);
  display: flex; flex-direction: column; overflow: hidden;
  transform: scale(0.9) translateY(20px); opacity: 0;
  pointer-events: none; transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
.agent-panel.open { transform: scale(1) translateY(0); opacity: 1; pointer-events: all; }

.agent-header {
  background: #065f46; padding: 14px 16px;
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.agent-header-icon {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.agent-header-icon svg { width: 16px; height: 16px; color: white; }
.agent-header-title { flex: 1; }
.agent-header-title h3 { font-size: 14px; font-weight: 700; color: white; }
.agent-header-title p { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 1px; }
.agent-close {
  background: none; border: none; cursor: pointer; padding: 4px;
  color: rgba(255,255,255,0.8); transition: color 0.15s;
}
.agent-close:hover { color: white; }
.agent-close svg { width: 18px; height: 18px; }

.agent-key-bar {
  background: #f0fdf4; border-bottom: 1px solid #d1fae5;
  padding: 8px 12px; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.agent-key-bar input {
  flex: 1; font-size: 12px; border: 1px solid #d1d5db; border-radius: 6px;
  padding: 5px 8px; font-family: monospace; background: white; outline: none;
}
.agent-key-bar input:focus { border-color: #065f46; }
.agent-key-btn {
  font-size: 11px; font-weight: 600; padding: 5px 10px;
  background: #065f46; color: white; border: none; border-radius: 6px; cursor: pointer;
}
.agent-key-label { font-size: 11px; color: #374151; white-space: nowrap; }
.agent-key-saved { font-size: 11px; color: #065f46; font-weight: 600; }

.agent-messages {
  flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px;
}
.agent-msg { display: flex; gap: 8px; }
.agent-msg.user { flex-direction: row-reverse; }
.agent-msg-bubble {
  max-width: 82%; padding: 10px 12px; border-radius: 12px;
  font-size: 13px; line-height: 1.5;
}
.agent-msg.user .agent-msg-bubble {
  background: #065f46; color: white; border-bottom-right-radius: 4px;
}
.agent-msg.bot .agent-msg-bubble {
  background: #f3f4f6; color: #1f2937; border-bottom-left-radius: 4px;
}
.agent-msg-avatar {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 12px;
}
.agent-msg.bot .agent-msg-avatar { background: #d1fae5; color: #065f46; font-weight: 700; }
.agent-msg.user .agent-msg-avatar { background: #065f46; color: white; font-weight: 700; }

.agent-msg-bubble p { margin-bottom: 6px; }
.agent-msg-bubble p:last-child { margin-bottom: 0; }
.agent-msg-bubble strong { font-weight: 700; }
.agent-msg-bubble ul, .agent-msg-bubble ol { padding-left: 16px; margin: 4px 0; }
.agent-msg-bubble li { margin-bottom: 2px; }
.agent-msg-bubble table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 6px 0; }
.agent-msg-bubble th { background: #e5e7eb; padding: 4px 8px; text-align: left; font-weight: 600; }
.agent-msg-bubble td { padding: 3px 8px; border-bottom: 1px solid #e5e7eb; }

.agent-typing { display: flex; gap: 4px; padding: 4px 0; align-items: center; }
.agent-typing span {
  width: 7px; height: 7px; border-radius: 50%; background: #9ca3af;
  animation: agentDot 1.2s infinite;
}
.agent-typing span:nth-child(2) { animation-delay: 0.2s; }
.agent-typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes agentDot { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-4px); opacity: 1; } }

.agent-suggestions {
  padding: 0 14px 10px; display: flex; flex-wrap: wrap; gap: 6px; flex-shrink: 0;
}
.agent-suggestion {
  font-size: 11px; padding: 5px 10px; border: 1px solid #d1d5db;
  border-radius: 20px; background: white; cursor: pointer; color: #374151;
  transition: all 0.15s; white-space: nowrap;
}
.agent-suggestion:hover { border-color: #065f46; color: #065f46; background: #f0fdf4; }

.agent-input-row {
  padding: 10px 12px; border-top: 1px solid #e5e7eb; display: flex; gap: 8px; flex-shrink: 0;
  background: white;
}
.agent-input {
  flex: 1; border: 1px solid #d1d5db; border-radius: 22px;
  padding: 9px 14px; font-size: 13px; font-family: inherit; outline: none; resize: none;
  max-height: 80px; overflow-y: auto; line-height: 1.4;
}
.agent-input:focus { border-color: #065f46; }
.agent-send {
  width: 36px; height: 36px; border-radius: 50%; background: #065f46;
  border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; align-self: flex-end; transition: background 0.15s;
}
.agent-send:hover { background: #047857; }
.agent-send:disabled { background: #d1d5db; cursor: default; }
.agent-send svg { width: 16px; height: 16px; color: white; }

.agent-no-data {
  font-size: 12px; color: #9ca3af; text-align: center; padding: 20px 14px;
  line-height: 1.6;
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <h1>Services Business OKRs</h1>
    <p>FY2025 Performance Dashboard · Strategy | Consulting | Managed Services</p>
  </div>
  <div class="header-right">
    <input type="file" id="xlsxFileInput" accept=".xlsx,.xls" style="display:none" onchange="handleFileInput(event)">
    <button class="upload-btn" onclick="document.getElementById('xlsxFileInput').click()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
      Load Excel
    </button>
    <div id="authArea">
      <button class="auth-btn" onclick="signIn()">
        <svg viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg" width="16" height="16"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
        Connect to SharePoint
      </button>
    </div>
    <select class="month-select" id="monthSel"></select>
    <div class="view-toggle">
      <button class="view-btn active" data-view="MTD">MTD</button>
      <button class="view-btn" data-view="YTD">YTD</button>
      <button class="view-btn" data-view="FORECAST">Forecast</button>
    </div>
  </div>
</header>

<script>
// ===== SHAREPOINT / MSAL CONFIG =====
// SETUP REQUIRED: Replace CLIENT_ID with your Azure AD App Registration client ID.
// See README for instructions: https://github.com/ajoseph1990/services-okr-dashboard
const SP_CONFIG = {
  clientId: "YOUR_CLIENT_ID_HERE",           // Azure AD App Registration → Application (client) ID
  tenantId: "gep1.onmicrosoft.com",          // Your tenant (or use "common" for any org account)
  sharePointHost: "gep1.sharepoint.com",
  sitePath: "/sites/ResourcingPlanner",
  fileName: "GEP_Services_OKR_Data Updated.xlsx",
  sheets: {
    metrics:  "Monthly Metrics",
    deals:    "Deals",
    pipeline: "Pipeline",
    bonus:    "Bonus"
  }
};

let msalInstance = null;
let currentAccount = null;
let isLiveData = false;
let lastFileModified = null;   // ISO string from Graph API
let lastSyncTime = null;       // Date object of last successful sync
let pollIntervalId = null;
let syncLabelIntervalId = null;
const POLL_MS = 5 * 60 * 1000; // check for file changes every 5 minutes

function initMSAL() {
  if (SP_CONFIG.clientId === "YOUR_CLIENT_ID_HERE") return;
  try {
    msalInstance = new msal.PublicClientApplication({
      auth: {
        clientId: SP_CONFIG.clientId,
        authority: `https://login.microsoftonline.com/${SP_CONFIG.tenantId}`,
        redirectUri: window.location.origin + window.location.pathname
      },
      cache: { cacheLocation: "sessionStorage" }
    });
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      currentAccount = accounts[0];
      showUserInfo(currentAccount);
      loadSharePointData();
    }
  } catch(e) {
    console.warn("MSAL init failed:", e);
  }
}

async function signIn() {
  if (!msalInstance) {
    alert("SharePoint is not configured yet.\n\nAn Azure AD App Registration is needed.\nSee README for setup instructions.");
    return;
  }
  try {
    const result = await msalInstance.loginPopup({
      scopes: ["User.Read", "Sites.Read.All", "Files.Read.All"]
    });
    currentAccount = result.account;
    showUserInfo(currentAccount);
    await loadSharePointData();
  } catch(e) {
    if (!e.message?.includes("user_cancelled")) alert("Sign in failed: " + e.message);
  }
}

async function signOut() {
  if (!msalInstance) return;
  stopPolling();
  await msalInstance.logoutPopup({ account: currentAccount });
  currentAccount = null; isLiveData = false; lastFileModified = null; lastSyncTime = null;
  document.getElementById("authArea").innerHTML = `
    <button class="auth-btn" onclick="signIn()">
      <svg viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg" width="16" height="16"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
      Connect to SharePoint
    </button>`;
  Object.assign(EMBEDDED_DATA, _ORIGINAL_EMBEDDED_DATA);
  init();
}

// ---- UI helpers ----

function showUserInfo(account) {
  const name = account.name || account.username;
  document.getElementById("authArea").innerHTML = `
    <div class="user-info">
      <span class="data-badge ${isLiveData ? 'live' : 'embedded'}" id="dataBadge">
        ${isLiveData ? 'Live Data' : 'Connecting...'}
      </span>
      <span class="sync-label" id="syncLabel"></span>
      <button class="refresh-btn" id="refreshBtn" onclick="loadSharePointData(false)">↻ Refresh</button>
      <span class="user-name" title="${name}">${name}</span>
      <button class="signout-btn" onclick="signOut()">Sign out</button>
    </div>`;
  updateSyncLabel();
}

function updateSyncLabel() {
  const el = document.getElementById("syncLabel");
  if (!el) return;
  if (!lastSyncTime) { el.textContent = ""; return; }
  const mins = Math.floor((Date.now() - lastSyncTime.getTime()) / 60000);
  el.textContent = mins < 1 ? "Synced just now" : `Synced ${mins}m ago`;
}

function flashUpdated() {
  const el = document.getElementById("dataBadge");
  if (!el) return;
  el.textContent = "✓ Updated!";
  el.style.background = "#bfdbfe"; el.style.color = "#1e3a8a";
  setTimeout(() => {
    el.className = "data-badge live";
    el.textContent = "Live Data";
    el.style.background = ""; el.style.color = "";
  }, 3000);
}

// ---- Polling ----

function startPolling() {
  stopPolling();
  pollIntervalId = setInterval(() => checkForUpdates(), POLL_MS);
  syncLabelIntervalId = setInterval(() => updateSyncLabel(), 60000);
}

function stopPolling() {
  if (pollIntervalId)    { clearInterval(pollIntervalId);    pollIntervalId = null; }
  if (syncLabelIntervalId) { clearInterval(syncLabelIntervalId); syncLabelIntervalId = null; }
}

async function checkForUpdates() {
  if (!currentAccount || !lastFileModified) return;
  try {
    const token = await getGraphToken();
    const site = await graphGet(token, `/sites/${SP_CONFIG.sharePointHost}:${SP_CONFIG.sitePath}`);
    const search = await graphGet(token, `/sites/${site.id}/drive/root/search(q='${encodeURIComponent(SP_CONFIG.fileName)}')`);
    const fileItem = search.value?.find(f => f.name === SP_CONFIG.fileName || f.name.includes("GEP_Services_OKR_Data"));
    if (!fileItem) return;
    const serverModified = fileItem.lastModifiedDateTime;
    if (serverModified !== lastFileModified) {
      console.log("SharePoint file changed — reloading data...");
      await loadSharePointData(true); // silent = true (no loading overlay)
    }
  } catch(e) {
    console.warn("Auto-check failed:", e.message);
  }
}

// ---- Graph API ----

async function getGraphToken() {
  const result = await msalInstance.acquireTokenSilent({
    scopes: ["https://graph.microsoft.com/Sites.Read.All", "https://graph.microsoft.com/Files.Read.All"],
    account: currentAccount
  }).catch(() => msalInstance.acquireTokenPopup({
    scopes: ["https://graph.microsoft.com/Sites.Read.All", "https://graph.microsoft.com/Files.Read.All"]
  }));
  return result.accessToken;
}

async function graphGet(token, path) {
  const res = await fetch(`https://graph.microsoft.com/v1.0${path}`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  if (!res.ok) throw new Error(`Graph API ${path} → ${res.status}`);
  return res.json();
}

async function readSheet(token, driveId, itemId, sheetName) {
  const data = await graphGet(token, `/drives/${driveId}/items/${itemId}/workbook/worksheets('${encodeURIComponent(sheetName)}')/usedRange`);
  const [headers, ...rows] = data.values;
  return rows
    .filter(r => r.some(c => c !== null && c !== ""))
    .map(r => {
      const obj = {};
      headers.forEach((h, i) => { if (h) obj[String(h).trim()] = r[i] ?? null; });
      return obj;
    });
}

// ---- Main data loader ----
// silent=false  → show full loading overlay (manual refresh / first load)
// silent=true   → no overlay, background auto-update

async function loadSharePointData(silent = false) {
  const refreshBtn = document.getElementById("refreshBtn");
  if (refreshBtn) refreshBtn.disabled = true;
  const wasAlreadyLive = isLiveData;
  if (!silent) showLoading("Connecting to SharePoint...");

  try {
    const token = await getGraphToken();

    if (!silent) showLoading("Locating SharePoint site...");
    const site = await graphGet(token, `/sites/${SP_CONFIG.sharePointHost}:${SP_CONFIG.sitePath}`);

    if (!silent) showLoading("Finding Excel file...");
    const search = await graphGet(token, `/sites/${site.id}/drive/root/search(q='${encodeURIComponent(SP_CONFIG.fileName)}')`);
    const fileItem = search.value?.find(f => f.name === SP_CONFIG.fileName || f.name.includes("GEP_Services_OKR_Data"));
    if (!fileItem) throw new Error(`File "${SP_CONFIG.fileName}" not found in SharePoint.`);

    const driveId = fileItem.parentReference?.driveId;
    const itemId  = fileItem.id;
    lastFileModified = fileItem.lastModifiedDateTime;

    if (!silent) showLoading("Reading Excel data...");
    const [metricsRows, dealsRows, pipelineRows, bonusRows] = await Promise.all([
      readSheet(token, driveId, itemId, SP_CONFIG.sheets.metrics),
      readSheet(token, driveId, itemId, SP_CONFIG.sheets.deals),
      readSheet(token, driveId, itemId, SP_CONFIG.sheets.pipeline),
      readSheet(token, driveId, itemId, SP_CONFIG.sheets.bonus)
    ]);

    // Parse forecasts from column P ("Forecast" column) on each metric row
    const parseNum = v => (v === null || v === "" || v === undefined) ? undefined : parseFloat(v) || 0;
    const forecasts = {};
    metricsRows
      .filter(r => r.Metric && !String(r.Metric).startsWith("MTD Target"))
      .forEach(r => {
        const fv = parseNum(r["Forecast"]);
        if (fv != null && fv > 0) forecasts[String(r.Metric).trim()] = fv;
      });

    EMBEDDED_DATA.metrics = metricsRows
      .filter(r => r.Metric)
      .map(r => {
        const obj = { Metric: String(r.Metric).trim() };
        if (r["Annual Target"] != null) obj["Annual Target"] = parseNum(r["Annual Target"]);
        ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"].forEach(m => {
          if (r[m] != null) obj[m] = parseNum(r[m]);
        });
        if (r.YTD != null) obj.YTD = parseNum(r.YTD);
        return obj;
      });
    const dealsSLCol    = detectSLCol(dealsRows);
    const pipelineSLCol = detectSLCol(pipelineRows);
    const bonusSLCol    = detectSLCol(bonusRows);

    EMBEDDED_DATA.deals = dealsRows.map(r => ({
      Month: String(r.Month || ""), Client: String(r.Client || ""),
      Type: String(r.Type || ""), Scope: String(r.Scope || ""),
      "ACV ($M)": parseNum(r["ACV ($M)"]) || 0,
      ServiceLine: getSL(r, dealsSLCol)
    }));
    EMBEDDED_DATA.pipeline = pipelineRows.map(r => ({
      Client: String(r.Client || ""), Scope: String(r.Scope || ""),
      "ACV ($M)": parseNum(r["ACV ($M)"]) || 0,
      "Weighted ACV ($M)": parseNum(r["Weighted ACV ($M)"]) || 0,
      "Probability (H/M/L)": String(r["Probability (H/M/L)"] || r.Probability || "Low"),
      ServiceLine: getSL(r, pipelineSLCol)
    }));
    EMBEDDED_DATA.bonus = bonusRows.map(r => ({
      Client: String(r.Client || ""),
      "Estimated Bonus ($M)": parseNum(r["Estimated Bonus ($M)"]) || 0,
      "Probability (H/M/L)": String(r["Probability (H/M/L)"] || r.Probability || "Low"),
      ServiceLine: getSL(r, bonusSLCol)
    }));
    EMBEDDED_DATA.forecasts = forecasts;

    isLiveData = true;
    lastSyncTime = new Date();
    hideLoading();
    showUserInfo(currentAccount);
    if (refreshBtn) refreshBtn.disabled = false;
    if (wasAlreadyLive && silent) flashUpdated(); // pulse only on auto-update, not first load
    init();
    startPolling(); // (re)start polling after every successful load

  } catch(err) {
    hideLoading();
    console.error("SharePoint load error:", err);
    if (refreshBtn) refreshBtn.disabled = false;
    const errEl = document.createElement("span");
    errEl.style.cssText = "color:#ef4444;font-size:12px;margin-left:8px";
    errEl.textContent = "⚠ " + (err.message || String(err));
    const area = document.getElementById("authArea");
    if (area) { const old = area.querySelector(".err-msg"); if(old) old.remove(); errEl.className="err-msg"; area.appendChild(errEl); }
  }
}

function showLoading(text) {
  document.getElementById("loadingText").textContent = text;
  document.getElementById("loadingOverlay").style.display = "flex";
}
function hideLoading() {
  document.getElementById("loadingOverlay").style.display = "none";
}

// ===== LOCAL EXCEL FILE LOADER =====

// Drag-and-drop support on the whole window
window.addEventListener("dragover", e => {
  if ([...e.dataTransfer.items].some(i => i.kind === "file")) {
    e.preventDefault();
    document.getElementById("dropOverlay").style.display = "flex";
  }
});
window.addEventListener("dragleave", e => {
  if (!e.relatedTarget) document.getElementById("dropOverlay").style.display = "none";
});
window.addEventListener("drop", e => {
  e.preventDefault();
  document.getElementById("dropOverlay").style.display = "none";
  const file = e.dataTransfer.files[0];
  if (file) parseLocalExcel(file);
});

function handleFileInput(e) {
  const file = e.target.files[0];
  if (file) parseLocalExcel(file);
  e.target.value = ""; // reset so same file can be re-loaded
}

function parseLocalExcel(file) {
  if (!file.name.match(/\.xlsx?$/i)) {
    alert("Please load an .xlsx or .xls file.");
    return;
  }
  showLoading("Parsing " + file.name + "...");
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type: "array", cellDates: true });

      const sheetNames = {
        metrics:  SP_CONFIG.sheets.metrics,
        deals:    SP_CONFIG.sheets.deals,
        pipeline: SP_CONFIG.sheets.pipeline,
        bonus:    SP_CONFIG.sheets.bonus
      };

      function readWbSheet(name) {
        const ws = wb.Sheets[name];
        if (!ws) throw new Error(`Sheet "${name}" not found in ${file.name}.`);
        return XLSX.utils.sheet_to_json(ws, { defval: null });
      }

      const metricsRows  = readWbSheet(sheetNames.metrics);
      const dealsRows    = readWbSheet(sheetNames.deals);
      const pipelineRows = readWbSheet(sheetNames.pipeline);
      const bonusRows    = readWbSheet(sheetNames.bonus);

      applyParsedData(metricsRows, dealsRows, pipelineRows, bonusRows);

      hideLoading();
      stopPolling();                       // no polling for local files
      lastFileModified = null;
      lastSyncTime = new Date();

      // Show local file badge in authArea (only if not already signed into SharePoint)
      if (!isLiveData) {
        const area = document.getElementById("authArea");
        area.innerHTML = `
          <div class="user-info">
            <span class="data-badge local-badge">📂 Local File</span>
            <span class="sync-label" id="syncLabel">Loaded ${file.name}</span>
            <button class="upload-btn" onclick="document.getElementById('xlsxFileInput').click()" style="padding:7px 12px;border-radius:6px;font-size:12px">↺ Reload</button>
            <button class="signout-btn" onclick="clearLocalFile()">✕ Clear</button>
          </div>`;
      }

      init();
    } catch(err) {
      hideLoading();
      alert("Failed to parse Excel file:\n" + err.message);
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

// Find the column containing service-line labels (MS / Consulting / Strategy / Managed Services).
// 1. First tries header-name match (e.g. "Service Line", "ServiceLine", "service_line").
// 2. Falls back to value-based scoring across all columns.
function detectSLCol(rows) {
  if (!rows || !rows.length) return null;
  const keys = Object.keys(rows[0]);

  // 1. Header-based: prefer any column whose name looks like "service line"
  const headerMatch = keys.find(k => {
    const h = k.toLowerCase().replace(/[\s_\-]+/g, "");
    return h === "serviceline" || h === "service";
  });
  if (headerMatch) return headerMatch;

  // 2. Value-based fallback
  const isSlVal = v => {
    const s = String(v || "").toLowerCase().trim();
    return s === "ms" || s === "consulting" || s === "strategy" ||
           s === "managed services" || s === "managed service" ||
           s.startsWith("managed") || s.includes("consult");
  };
  let bestCol = null, bestScore = 0;
  for (const k of keys) {
    const score = rows.reduce((n, r) => n + (isSlVal(r[k]) ? 1 : 0), 0);
    if (score > bestScore) { bestScore = score; bestCol = k; }
  }
  return bestScore > 0 ? bestCol : null;
}

function getSL(r, col) {
  if (!col) return "";
  return String(r[col] || "").trim();
}

function applyParsedData(metricsRows, dealsRows, pipelineRows, bonusRows) {
  const parseNum = v => (v === null || v === "" || v === undefined) ? undefined : parseFloat(v) || 0;

  // Read forecasts from column P ("Forecast" column) on each metric row
  const forecasts = {};
  metricsRows
    .filter(r => r.Metric && !String(r.Metric).startsWith("MTD Target"))
    .forEach(r => {
      const fv = parseNum(r["Forecast"]);
      if (fv != null && fv > 0) forecasts[String(r.Metric).trim()] = fv;
    });

  EMBEDDED_DATA.metrics = metricsRows
    .filter(r => r.Metric)
    .map(r => {
      const obj = { Metric: String(r.Metric).trim() };
      if (r["Annual Target"] != null) obj["Annual Target"] = parseNum(r["Annual Target"]);
      ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"].forEach(m => {
        if (r[m] != null) obj[m] = parseNum(r[m]);
      });
      if (r.YTD != null) obj.YTD = parseNum(r.YTD);
      return obj;
    });

  const dealsSLCol    = detectSLCol(dealsRows);
  const pipelineSLCol = detectSLCol(pipelineRows);
  const bonusSLCol    = detectSLCol(bonusRows);

  EMBEDDED_DATA.deals = dealsRows.map(r => ({
    Month: String(r.Month || ""), Client: String(r.Client || ""),
    Type: String(r.Type || ""), Scope: String(r.Scope || ""),
    "ACV ($M)": parseNum(r["ACV ($M)"]) || 0,
    ServiceLine: getSL(r, dealsSLCol)
  }));

  EMBEDDED_DATA.pipeline = pipelineRows.map(r => ({
    Client: String(r.Client || ""), Scope: String(r.Scope || ""),
    "ACV ($M)": parseNum(r["ACV ($M)"]) || 0,
    "Weighted ACV ($M)": parseNum(r["Weighted ACV ($M)"]) || 0,
    "Probability (H/M/L)": String(r["Probability (H/M/L)"] || r.Probability || "Low"),
    ServiceLine: getSL(r, pipelineSLCol)
  }));

  EMBEDDED_DATA.bonus = bonusRows.map(r => ({
    Client: String(r.Client || ""),
    "Estimated Bonus ($M)": parseNum(r["Estimated Bonus ($M)"]) || 0,
    "Probability (H/M/L)": String(r["Probability (H/M/L)"] || r.Probability || "Low"),
    ServiceLine: getSL(r, bonusSLCol)
  }));

  EMBEDDED_DATA.forecasts = forecasts;

  // Debug: show detected columns and unique ServiceLine values so we can confirm detection
  const uniq = arr => [...new Set(arr.map(x => x.ServiceLine))].filter(Boolean);
  const dbg = [
    `Deals SL col: "${dealsSLCol}" → values: [${uniq(EMBEDDED_DATA.deals).join(", ")}]`,
    `Pipeline SL col: "${pipelineSLCol}" → values: [${uniq(EMBEDDED_DATA.pipeline).join(", ")}]`,
    `Bonus SL col: "${bonusSLCol}" → values: [${uniq(EMBEDDED_DATA.bonus).join(", ")}]`
  ].join("\n");
  console.log("[SL Debug]\n" + dbg);
  let dbgEl = document.getElementById("slDebug");
  if (!dbgEl) {
    dbgEl = document.createElement("div");
    dbgEl.id = "slDebug";
    dbgEl.style.cssText = "position:fixed;bottom:8px;left:8px;background:#1e293b;color:#94a3b8;font:11px/1.5 monospace;padding:8px 12px;border-radius:8px;z-index:9999;max-width:600px;white-space:pre;opacity:0.92;cursor:pointer";
    dbgEl.title = "Click to dismiss";
    dbgEl.onclick = () => dbgEl.remove();
    document.body.appendChild(dbgEl);
  }
  dbgEl.textContent = dbg;
}

function clearLocalFile() {

  document.getElementById("authArea").innerHTML = `
    <button class="auth-btn" onclick="signIn()">
      <svg viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg" width="16" height="16"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
      Connect to SharePoint
    </button>`;
  init();
}

<script>
// ===== DEFAULT DATA — load your Excel file to populate =====
const EMBEDDED_DATA = {
  metrics: [],
  forecasts: {},
  deals: [],
  pipeline: [],
  bonus: []
};

// ===== GLOBAL STATE =====
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
let activeTab = "overview";
let viewMode = "YTD";
let currentMonth = 1; // Feb

const ANN_TGT = {
  revTotal: 345, revStrategy: 10, revConsulting: 100, revMS: 235, consultingNew: 30,
  acvTotal: 175, acvNewLogo: 65, acvUpsell: 110, pipelineCarry: 15,
  marginOverall: 30, util: 84, conM: 42, conU: 82, msM: 27, msU: 88, msRenewal: 75,
  agents: 5000, arr: 10, aiEff: 20,
};

let DATA = null;

// ===== INIT =====
function init() {
  DATA = { 
    metrics: {}, 
    mtdTargets: {}, 
    ytdValues: {},
    forecasts: EMBEDDED_DATA.forecasts || {},
    deals: EMBEDDED_DATA.deals, 
    pipeline: EMBEDDED_DATA.pipeline,
    bonus: EMBEDDED_DATA.bonus || []
  };
  
  EMBEDDED_DATA.metrics.forEach(row => {
    const metric = row.Metric;
    if (metric.startsWith("MTD Target -")) {
      const baseName = metric.replace("MTD Target - ", "").trim();
      DATA.mtdTargets[baseName] = {};
      MONTHS.forEach(m => { if (row[m] !== undefined) DATA.mtdTargets[baseName][m] = row[m]; });
      DATA.mtdTargets[baseName].YTD = row.YTD || 0;
    } else {
      DATA.metrics[metric] = { values: {}, target: row["Annual Target"], ytd: row.YTD || 0 };
      MONTHS.forEach(m => { DATA.metrics[metric].values[m] = row[m] || 0; });
    }
  });
  
  const monthSel = document.getElementById("monthSel");
  MONTHS.forEach((m, i) => {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = m;
    monthSel.appendChild(opt);
  });
  monthSel.value = currentMonth;
  monthSel.onchange = () => { currentMonth = +monthSel.value; render(); };
  
  document.querySelectorAll(".nav-tab").forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      activeTab = tab.dataset.tab;
      // People tab has no Forecast view — clamp to YTD
      if (activeTab === "people" && viewMode === "FORECAST") {
        viewMode = "YTD";
      }
      render();
    };
  });
  
  document.querySelectorAll(".view-btn").forEach(btn => {
    if (btn.dataset.view === viewMode) btn.classList.add("active");
    else btn.classList.remove("active");
    btn.onclick = () => {
      document.querySelectorAll(".view-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      viewMode = btn.dataset.view;
      render();
    };
  });

  // Default to overview tab
  document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
  const overviewTab = document.querySelector('.nav-tab[data-tab="overview"]');
  if (overviewTab) overviewTab.classList.add("active");
  activeTab = "overview";

  render();
}

// ===== HELPERS =====
function getVal(name, months) {
  if (!DATA?.metrics[name]) return 0;
  return months.reduce((s, m) => s + (DATA.metrics[name].values[m] || 0), 0);
}

function getYTD(name) {
  if (!DATA?.metrics[name]) return 0;
  return DATA.metrics[name].ytd || 0;
}

function getForecast(name) {
  return DATA?.forecasts[name] || 0;
}

function getAvg(name, months) {
  if (!DATA?.metrics[name]) return 0;
  const vals = months.map(m => DATA.metrics[name].values[m] || 0).filter(v => v > 0);
  return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
}

function getMTD(name, month) { return DATA?.mtdTargets[name]?.[month] || null; }
function getMTDYTD(name) { return DATA?.mtdTargets[name]?.YTD || null; }
function getAnnTgt(name) { return DATA?.metrics[name]?.target || null; }

function getMonths() {
  if (viewMode === "MTD") return [MONTHS[currentMonth]];
  return MONTHS.slice(0, currentMonth + 1);
}

function compute(months) {
  const useYTD = viewMode === "YTD";
  const useForecast = viewMode === "FORECAST";
  
  return {
    rev: {
      total: useYTD ? getYTD("Rev Total ($M)") : getVal("Rev Total ($M)", months),
      strategy: useYTD ? getYTD("Rev Strategy ($M)") : getVal("Rev Strategy ($M)", months),
      consulting: useYTD ? getYTD("Rev Consulting ($M)") : getVal("Rev Consulting ($M)", months),
      ms: useYTD ? getYTD("Rev MS ($M)") : getVal("Rev MS ($M)", months),
      consultingNew: useYTD ? getYTD("Consulting New Offerings %") : (viewMode === "MTD" ? getVal("Consulting New Offerings %", months) : getAvg("Consulting New Offerings %", months)),
      // Forecasts
      forecastTotal: getForecast("Rev Total ($M)"),
      forecastStrategy: getForecast("Rev Strategy ($M)"),
      forecastConsulting: getForecast("Rev Consulting ($M)"),
      forecastMS: getForecast("Rev MS ($M)")
    },
    acv: {
      total: useYTD ? getYTD("ACV Total ($M)") : getVal("ACV Total ($M)", months),
      newLogo: useYTD ? getYTD("ACV New Logos ($M)") : getVal("ACV New Logos ($M)", months),
      upsell: useYTD ? getYTD("ACV Upsell ($M)") : getVal("ACV Upsell ($M)", months),
      pipelineCarry: useYTD ? getYTD("Pipeline Carry %") : (viewMode === "MTD" ? getVal("Pipeline Carry %", months) : getAvg("Pipeline Carry %", months))
    },
    mg: {
      overall: useYTD ? getYTD("Margin Overall %") : (viewMode === "MTD" ? getVal("Margin Overall %", months) : getAvg("Margin Overall %", months)),
      util: useYTD ? getYTD("Utilization %") : (viewMode === "MTD" ? getVal("Utilization %", months) : getAvg("Utilization %", months)),
      conM: useYTD ? getYTD("Consulting Margin %") : (viewMode === "MTD" ? getVal("Consulting Margin %", months) : getAvg("Consulting Margin %", months)),
      conU: useYTD ? getYTD("Consulting Util %") : (viewMode === "MTD" ? getVal("Consulting Util %", months) : getAvg("Consulting Util %", months)),
      msM: useYTD ? getYTD("MS Margin %") : (viewMode === "MTD" ? getVal("MS Margin %", months) : getAvg("MS Margin %", months)),
      msU: useYTD ? getYTD("MS Util %") : (viewMode === "MTD" ? getVal("MS Util %", months) : getAvg("MS Util %", months))
    },
    ag: {
      created: useYTD ? getYTD("Agents Created") : getVal("Agents Created", months),
      arr: useYTD ? getYTD("Agentic ARR ($M)") : getVal("Agentic ARR ($M)", months),
      eff: useYTD ? getYTD("AI Efficiency %") : (viewMode === "MTD" ? getVal("AI Efficiency %", months) : getAvg("AI Efficiency %", months))
    },
    pp: {
      csat: useYTD ? getYTD("CSAT %") : (viewMode === "MTD" ? getVal("CSAT %", months) : getAvg("CSAT %", months)),
      esat: useYTD ? getYTD("ESAT %") : (viewMode === "MTD" ? getVal("ESAT %", months) : getAvg("ESAT %", months)),
      vol: useYTD ? getYTD("Voluntary Attrition %") : (viewMode === "MTD" ? getVal("Voluntary Attrition %", months) : getAvg("Voluntary Attrition %", months)),
      reg: useYTD ? getYTD("Regrettable Attrition %") : (viewMode === "MTD" ? getVal("Regrettable Attrition %", months) : getAvg("Regrettable Attrition %", months)),
      mgr: useYTD ? getYTD("Mgr Retention %") : (viewMode === "MTD" ? getVal("Mgr Retention %", months) : getAvg("Mgr Retention %", months)),
      lat: useYTD ? getYTD("Lateral Hire Success %") : (viewMode === "MTD" ? getVal("Lateral Hire Success %", months) : getAvg("Lateral Hire Success %", months)),
      div: useYTD ? getYTD("Diversity Score %") : (viewMode === "MTD" ? getVal("Diversity Score %", months) : getAvg("Diversity Score %", months))
    },
    sc: {
      rev: useYTD ? getYTD("SC Revenue ($M)") : getVal("SC Revenue ($M)", months),
      pipe: useYTD ? getYTD("SC Pipeline ($M)") : getVal("SC Pipeline ($M)", months),
      cust: useYTD ? getYTD("SC Customers") : getVal("SC Customers", months),
      thought: useYTD ? getYTD("SC Thought Leadership") : getVal("SC Thought Leadership", months)
    },
    msRenewal: useYTD ? getYTD("MS Renewal %") : (viewMode === "MTD" ? getVal("MS Renewal %", months) : getAvg("MS Renewal %", months)),
    deals: DATA.deals.filter(d => months.includes(d.Month)),
    pipeline: DATA.pipeline,
    bonus: DATA.bonus
  };
}

function fmtM(v) { const n = +v.toFixed(2); return "$" + (n % 1 === 0 ? n.toFixed(0) : n.toFixed(1)) + "M"; }
function fmtK(v) { return "$" + (v * 1000).toFixed(0) + "K"; }

function filterBySL(arr, sl) {
  // If no row has a non-empty ServiceLine, column absent or undetected — show everything
  if (!arr.some(x => x.ServiceLine)) return arr;

  const s = sl.toLowerCase().trim();
  return arr.filter(x => {
    if (!x.ServiceLine) return false;
    const v = x.ServiceLine.toLowerCase().trim();
    // "MS" tab: match "ms", "managed services", "managed service", anything starting with "managed"
    if (s === "ms") return v === "ms" || v.startsWith("managed");
    // "Consulting" tab: match "consulting", "consult", or any value containing "consult"
    if (s === "consulting") return v.includes("consult");
    // "Strategy" tab
    if (s === "strategy") return v === "strategy" || v.includes("strategy");
    return v.includes(s);
  });
}

function pctColor(pct, low = false) {
  if (low) return pct <= 100 ? "green" : pct <= 120 ? "amber" : "red";
  return pct >= 95 ? "green" : pct >= 80 ? "amber" : "red";
}

function statusText(pct, low = false) {
  if (low) return pct <= 100 ? "ON TRACK" : pct <= 120 ? "AT RISK" : "BEHIND";
  return pct >= 95 ? "ON TRACK" : pct >= 80 ? "AT RISK" : "BEHIND";
}

function sparkSVG(color) {
  const colors = { green: "#10b981", red: "#ef4444", amber: "#f59e0b" };
  const c = colors[color] || colors.green;
  return `<svg class="hero-spark" viewBox="0 0 60 24"><path d="M0 20 L10 18 L20 15 L30 12 L40 8 L50 5 L60 2" fill="none" stroke="${c}" stroke-width="2"/></svg>`;
}

// ===== HERO CARD =====
function heroCard(opts) {
  const { label, value, actual, mtdTgt, ytdTgt, annTgt, forecast, unit, mIdx, subs, isAvg, low, isRevOrMargin, noPct } = opts;
  
  let target, pct, displayForecast, forecastLabel;
  const noMTDTarget = viewMode === "MTD" && mtdTgt == null;

  if (viewMode === "MTD") {
    target = noMTDTarget ? null : mtdTgt;
    pct = target ? (actual / target) * 100 : null;
    displayForecast = null;
    forecastLabel = "";
  } else if (viewMode === "YTD") {
    // For avg/rate metrics (%), annTgt is the correct YTD comparison (not prorated). For cumulative metrics, only use explicit ytdTgt from Excel.
    target = ytdTgt || (isAvg ? annTgt : null);
    pct = target ? (actual / target) * 100 : null;
    displayForecast = null;
    forecastLabel = "";
  } else {
    // FORECAST view — only use real forecast from Excel, never calculate run-rate
    displayForecast = forecast || null;
    target = annTgt || null;
    pct = (displayForecast && target) ? (displayForecast / target) * 100 : null;
    forecastLabel = "Forecast";
  }
  
  const color = (noMTDTarget || pct == null) ? "neutral" : pctColor(pct, low);
  const status = (noMTDTarget || pct == null) ? "—" : statusText(pct, low);

  const hasGap = displayForecast != null && annTgt != null;
  const gap = hasGap ? displayForecast - annTgt : null;
  const gapStr = gap == null ? "—" :
                 unit === "$M" ? (gap >= 0 ? "+" + fmtM(gap) : "-" + fmtM(Math.abs(gap))) :
                 unit === "%" ? (gap >= 0 ? "+" + gap.toFixed(1) + "%" : gap.toFixed(1) + "%") :
                 (gap >= 0 ? "+" + gap.toFixed(0) : gap.toFixed(0));

  const forecastStr = displayForecast == null ? "—" :
                      unit === "$M" ? fmtM(displayForecast) :
                      unit === "%" ? displayForecast.toFixed(0) + "%" : displayForecast.toLocaleString();
  const annTgtStr = annTgt == null ? "—" :
                    unit === "$M" ? fmtM(annTgt) :
                    unit === "%" ? annTgt + "%" : annTgt.toLocaleString();

  // Build target line — only show when real data exists from Excel
  const fmtTgt = t => t == null ? "—" : unit === "$M" ? fmtM(t) : t.toFixed(0) + (unit === "%" ? "%" : "");
  let targetLineStr;
  if (viewMode === "YTD") {
    if (target == null) {
      targetLineStr = "";
    } else {
      targetLineStr = noPct
        ? `YTD target: ${fmtTgt(target)}`
        : `YTD target: ${fmtTgt(target)} · ${pct.toFixed(0)}% vs YTD target`;
    }
  } else if (viewMode === "FORECAST") {
    if (displayForecast == null && annTgt == null) {
      targetLineStr = "";
    } else if (isRevOrMargin) {
      targetLineStr = `Forecast: ${forecastStr} vs ${annTgtStr} Annual target`;
    } else {
      targetLineStr = noPct
        ? `Forecast: ${forecastStr}`
        : pct != null
          ? `Forecast: ${forecastStr} · ${pct.toFixed(0)}% vs Annual target`
          : `Forecast: ${forecastStr}`;
    }
  } else {
    // MTD — only show target line when a monthly target exists in Excel
    if (noMTDTarget) {
      targetLineStr = "";
    } else {
      targetLineStr = noPct
        ? `MTD target: ${fmtTgt(target)}`
        : `MTD target: ${fmtTgt(target)} · ${pct.toFixed(0)}% vs MTD target`;
    }
  }
  
  let subsHtml = "";
  if (subs && subs.length) {
    subsHtml = subs.map(s => {
      const sPct = s.t ? Math.min((s.v / s.t) * 100, 100) : 0;
      const sColor = pctColor(s.t ? (s.v / s.t) * 100 : 0, s.low);
      let tgtFmt = "";
      if (s.t) {
        if (s.value.includes("%")) tgtFmt = s.t.toFixed(0) + "%";
        else if (s.value.endsWith("M")) tgtFmt = fmtM(s.t);
        else if (s.value.endsWith("K")) tgtFmt = s.t >= 1 ? fmtM(s.t) : fmtK(s.t);
        else tgtFmt = s.t.toFixed(1);
      }
      return `<div class="sub-metric">
        <div class="sub-left">
          <div class="sub-label">${s.label}</div>
          <div class="sub-bar"><div class="sub-fill ${sColor}" style="width:${sPct}%"></div></div>
        </div>
        <div class="sub-right">
          <div class="sub-value">${s.value}</div>
          ${tgtFmt ? `<div class="sub-tgt">Tgt: ${tgtFmt}</div>` : ""}
        </div>
      </div>`;
    }).join("");
  }
  
  // Don't show % badge for noPct cards, or in Forecast mode for rev/margin, or MTD with no monthly target, or when pct is unavailable
  const showPct = !noPct && !noMTDTarget && pct != null && !(viewMode === "FORECAST" && isRevOrMargin);

  // Only show forecast section in Forecast view when real forecast data exists
  const showForecastSection = viewMode === "FORECAST" && (displayForecast != null || annTgt != null);

  // In FORECAST mode show the forecast figure prominently only when data exists
  const displayValue = (viewMode === "FORECAST" && isRevOrMargin && displayForecast != null) ? forecastStr : value;

  return `<div class="hero-card">
    <div class="hero-top">
      <div class="hero-header">
        <div class="hero-label">${label}</div>
        ${sparkSVG(color)}
      </div>
      <div class="hero-value">${displayValue}</div>
      <div class="hero-target-line">${targetLineStr}</div>
      <div class="hero-status">
        <span class="status-badge ${color}">${status}</span>
        ${showPct ? `<span class="hero-pct">${pct.toFixed(0)}%</span>` : ''}
      </div>
    </div>
    ${showForecastSection ? `<div class="hero-forecast">
      <div class="forecast-row">
        <div class="forecast-item">
          <div class="forecast-label">${forecastLabel}</div>
          <div class="forecast-value">${forecastStr}</div>
          <div class="forecast-sub">Updated</div>
        </div>
        <div class="forecast-item">
          <div class="forecast-label">Annual Tgt</div>
          <div class="forecast-value ${gap == null ? '' : gap < 0 ? 'behind' : 'on-track'}">${annTgtStr}</div>
          <div class="forecast-sub">${gap == null ? '—' : gap < 0 ? 'BEHIND' : 'ON TRACK'}</div>
        </div>
      </div>
      <div class="gap-row">
        <span class="gap-label">GAP</span>
        <span class="gap-value ${gap != null && gap >= 0 ? 'positive' : ''}">${gapStr}</span>
      </div>
    </div>` : ''}
    ${subsHtml ? `<div class="hero-subs">${subsHtml}</div>` : ''}
  </div>`;
}

// ===== OKR CARD =====
function okrCard(num, title, colorClass, metrics) {
  const metricsHtml = metrics.map(m => {
    const hasTgt = m.tgt != null;
    const pct = hasTgt ? (m.val / m.tgt) * 100 : 0;
    const color = hasTgt ? pctColor(pct, m.low) : "neutral";
    const status = hasTgt ? statusText(pct, m.low) : "—";
    const valStr = m.unit === "$M" ? fmtK(m.val) : m.unit === "%" ? m.val.toFixed(1) + "%" : Number(m.val).toFixed(0);
    const tgtStr = hasTgt ? (m.unit === "$M" ? "/ " + fmtM(m.tgt) : m.unit === "%" ? "/ " + Number(m.tgt).toFixed(0) + "%" : "/ " + Number(m.tgt).toFixed(0)) : "";

    return `<div class="okr-metric">
      <div class="okr-metric-left">
        <div class="okr-metric-label">${m.label}</div>
        ${hasTgt ? `<div class="okr-metric-bar"><div class="okr-metric-fill" style="width:${Math.min(pct,100)}%;background:var(--${color})"></div></div>` : ''}
      </div>
      <div class="okr-metric-right">
        <div class="okr-metric-value">${valStr} <span class="okr-metric-target">${tgtStr}</span></div>
        <div class="okr-metric-status ${color}">${status}</div>
      </div>
    </div>`;
  }).join("");
  
  return `<div class="okr-card">
    <div class="okr-header ${colorClass}">
      <span class="okr-num">${num}</span>
      <span class="okr-title">${title}</span>
    </div>
    <div class="okr-metrics">${metricsHtml}</div>
  </div>`;
}

// ===== DEAL SECTION WITH TOP 10 + OTHERS =====
function dealSection(deals, pipeline, bonus, showPipelineAndBonus = false) {
  let html = "";
  
  // CLOSED DEALS - Always show
  if (deals.length) {
    const total = deals.reduce((s, d) => s + (d["ACV ($M)"] || 0), 0);
    const sortedDeals = [...deals].sort((a, b) => (b["ACV ($M)"] || 0) - (a["ACV ($M)"] || 0));
    const top10 = sortedDeals.slice(0, 10);
    const others = sortedDeals.slice(10);
    const othersTotal = others.reduce((s, d) => s + (d["ACV ($M)"] || 0), 0);
    
    html += `<div class="deal-section">
      <div class="deal-header"><span class="deal-title">Closed Deals</span><span class="deal-total">${fmtM(total)} Total ACV</span></div>
      <table class="deal-table">
        <thead><tr><th>Client</th><th>Type</th><th>Scope</th><th>ACV</th></tr></thead>
        <tbody>
          ${top10.map(d => `<tr>
            <td class="deal-client">${d.Client}</td>
            <td>${d.Type}</td>
            <td class="deal-scope">${d.Scope}</td>
            <td class="deal-amt">${fmtM(d["ACV ($M)"] || 0)}</td>
          </tr>`).join("")}
          ${others.length > 0 ? `<tr style="background:#f9fafb;font-style:italic;">
            <td class="deal-client">Others (${others.length} deals)</td>
            <td>—</td>
            <td class="deal-scope">—</td>
            <td class="deal-amt">${fmtM(othersTotal)}</td>
          </tr>` : ''}
        </tbody>
      </table>
    </div>`;
  }
  
  // PIPELINE - Only in Forecast view
  if (showPipelineAndBonus && pipeline.length) {
    const total = pipeline.reduce((s, d) => s + (d["Weighted ACV ($M)"] || 0), 0);
    const sortedPipeline = [...pipeline].sort((a, b) => (b["Weighted ACV ($M)"] || 0) - (a["Weighted ACV ($M)"] || 0));
    const top10 = sortedPipeline.slice(0, 10);
    const others = sortedPipeline.slice(10);
    const othersTotal = others.reduce((s, d) => s + (d["Weighted ACV ($M)"] || 0), 0);
    const othersACV = others.reduce((s, d) => s + (d["ACV ($M)"] || 0), 0);
    
    html += `<div class="deal-section">
      <div class="deal-header"><span class="deal-title">Active Pipeline</span><span class="deal-total">${fmtM(total)} Weighted ACV</span></div>
      <table class="deal-table">
        <thead><tr><th>Client</th><th>Scope</th><th>ACV</th><th>Weighted</th><th>Prob</th></tr></thead>
        <tbody>
          ${top10.map(d => {
            const prob = (d["Probability (H/M/L)"] || "").toLowerCase();
            const cls = prob.includes("high") ? "high" : prob.includes("med") ? "med" : "low";
            return `<tr>
              <td class="deal-client">${d.Client}</td>
              <td class="deal-scope">${d.Scope}</td>
              <td class="deal-amt">${fmtM(d["ACV ($M)"] || 0)}</td>
              <td class="deal-amt">${fmtM(d["Weighted ACV ($M)"] || 0)}</td>
              <td><span class="prob-badge ${cls}">${d["Probability (H/M/L)"]}</span></td>
            </tr>`;
          }).join("")}
          ${others.length > 0 ? `<tr style="background:#f9fafb;font-style:italic;">
            <td class="deal-client">Others (${others.length} deals)</td>
            <td class="deal-scope">—</td>
            <td class="deal-amt">${fmtM(othersACV)}</td>
            <td class="deal-amt">${fmtM(othersTotal)}</td>
            <td>—</td>
          </tr>` : ''}
        </tbody>
      </table>
    </div>`;
  }
  
  // BONUS - Only in Forecast view, summarised by customer
  if (showPipelineAndBonus && bonus && bonus.length) {
    const total = bonus.reduce((s, b) => s + (b["Estimated Bonus ($M)"] || 0), 0);

    // Aggregate by Client: sum bonus, keep highest probability
    const probRank = p => { const s = String(p||"").toLowerCase(); return s.includes("high") ? 3 : s.includes("med") ? 2 : 1; };
    const byClient = {};
    bonus.forEach(b => {
      const key = (b.Client || "Unknown").trim();
      if (!byClient[key]) byClient[key] = { Client: key, bonus: 0, prob: b["Probability (H/M/L)"] || "" };
      byClient[key].bonus += b["Estimated Bonus ($M)"] || 0;
      if (probRank(b["Probability (H/M/L)"]) > probRank(byClient[key].prob)) byClient[key].prob = b["Probability (H/M/L)"];
    });
    const sorted = Object.values(byClient).sort((a, b) => b.bonus - a.bonus);

    html += `<div class="deal-section">
      <div class="deal-header"><span class="deal-title">Bonus Opportunities</span><span class="deal-total">${fmtM(total)} Total Potential</span></div>
      <table class="deal-table">
        <thead><tr><th>Client</th><th>Estimated Bonus</th><th>Probability</th></tr></thead>
        <tbody>
          ${sorted.map(b => {
            const cls = probRank(b.prob) === 3 ? "high" : probRank(b.prob) === 2 ? "med" : "low";
            return `<tr>
              <td class="deal-client">${b.Client}</td>
              <td class="deal-amt">${fmtM(b.bonus)}</td>
              <td><span class="prob-badge ${cls}">${b.prob}</span></td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>`;
  }
  
  return html;
}

    const fcst = name => DATA.forecasts?.[name] || null;

    const lines = [];
    lines.push(`## GEP Services OKR Dashboard — FY2025`);
    lines.push(`Current view: ${mName} 2025 | View mode: ${viewMode}`);
    lines.push('');

    // Revenue
    lines.push('### Revenue');
    lines.push(`Total Revenue: YTD $${d.rev.total.toFixed(1)}M | Annual Target $${ANN_TGT.revTotal}M | Forecast ${fcst('Rev Total ($M)') ? '$'+fcst('Rev Total ($M)').toFixed(1)+'M' : '—'}`);
    lines.push(`  Strategy:        YTD $${(d.rev.strategy*1000).toFixed(0)}K | Annual Target $${ANN_TGT.revStrategy}M`);
    lines.push(`  Consulting:      YTD $${d.rev.consulting.toFixed(1)}M | Annual Target $${ANN_TGT.revConsulting}M | Forecast ${fcst('Rev Consulting ($M)') ? '$'+fcst('Rev Consulting ($M)').toFixed(1)+'M' : '—'}`);
    lines.push(`  Managed Services:YTD $${d.rev.ms.toFixed(1)}M | Annual Target $${ANN_TGT.revMS}M | Forecast ${fcst('Rev MS ($M)') ? '$'+fcst('Rev MS ($M)').toFixed(1)+'M' : '—'}`);
    lines.push('');

    // ACV
    lines.push('### ACV (Closed)');
    lines.push(`Total ACV: YTD $${d.acv.total.toFixed(1)}M | Annual Target $${ANN_TGT.acvTotal}M`);
    lines.push(`  New Logos: $${d.acv.newLogo.toFixed(1)}M (target $${ANN_TGT.acvNewLogo}M)`);
    lines.push(`  Upsell:    $${d.acv.upsell.toFixed(1)}M (target $${ANN_TGT.acvUpsell}M)`);
    lines.push(`  Pipeline carry FY27: ${d.acv.pipelineCarry.toFixed(0)}% (target ${ANN_TGT.pipelineCarry}%)`);
    lines.push('');

    // Margin
    lines.push('### Services Margin');
    lines.push(`Overall Margin: ${d.mg.overall.toFixed(1)}% | Annual Target ${ANN_TGT.marginOverall}% | Forecast ${fcst('Margin %') ? fcst('Margin %').toFixed(1)+'%' : '—'}`);
    lines.push(`  Blended Utilization: ${d.mg.util.toFixed(1)}% (target ${ANN_TGT.util}%)`);
    lines.push(`  Consulting Margin:   ${d.mg.conM.toFixed(1)}% (target ${ANN_TGT.conM}%)`);
    lines.push(`  MS Margin:           ${d.mg.msM.toFixed(1)}% (target ${ANN_TGT.msM}%)`);
    lines.push('');

    // Consulting
    const conRev = d.rev.consulting, conTgt = ANN_TGT.revConsulting;
    lines.push('### Consulting');
    lines.push(`Revenue: $${conRev.toFixed(1)}M YTD vs $${conTgt}M annual target`);
    lines.push(`Utilization: ${d.mg.conU != null ? d.mg.conU.toFixed(1)+'%' : '—'} (target ${ANN_TGT.conU}%)`);
    lines.push(`Margin: ${d.mg.conM.toFixed(1)}% (target ${ANN_TGT.conM}%)`);
    lines.push(`New Offerings %: ${d.rev.consultingNew?.toFixed(1) ?? '—'}% (target ${ANN_TGT.consultingNew}%)`);
    lines.push('');

    // Managed Services
    lines.push('### Managed Services');
    lines.push(`Revenue: $${d.rev.ms.toFixed(1)}M YTD vs $${ANN_TGT.revMS}M annual target`);
    lines.push(`Utilization: ${d.mg.msU != null ? d.mg.msU.toFixed(1)+'%' : '—'} (target ${ANN_TGT.msU}%)`);
    lines.push(`Margin: ${d.mg.msM.toFixed(1)}% (target ${ANN_TGT.msM}%)`);
    lines.push(`Renewal Rate: ${d.msRenewal?.toFixed(1) ?? '—'}% (target ${ANN_TGT.msRenewal}%)`);
    lines.push('');

    // Agentic / AI
    lines.push('### Agentic ARR');
    lines.push(`ARR from Services Deals: $${(d.ag.arr*1000).toFixed(0)}K (target $${ANN_TGT.arr}M)`);
    lines.push(`Agents Created: ${d.ag.created} (target ${ANN_TGT.agents})`);
    lines.push(`AI Efficiency: ${d.ag.eff?.toFixed(1) ?? '—'}% (target ${ANN_TGT.aiEff}%)`);
    lines.push('');

    // People
    lines.push('### People & Culture');
    const ppMetrics = [
      ['CSAT %', d.pp.csat, '%'], ['ESAT %', d.pp.esat, '%'],
      ['Voluntary Attrition %', d.pp.vol, '%'], ['Regrettable Attrition %', d.pp.reg, '%'],
      ['Mgr Retention %', d.pp.mgr, '%'], ['Lateral Hire Success %', d.pp.lat, '%'],
      ['Diversity Score %', d.pp.div, '%']
    ];
    ppMetrics.forEach(([name, val, unit]) => {
      const t = tgt(name);
      lines.push(`  ${name}: ${fmt(val, unit)}${t != null ? ` | Target ${fmt(t, unit)}` : ''}`);
    });
    lines.push('');

    // SC Strategy
    lines.push('### SC Strategy');
    const scMetrics = [
      ['SC Revenue ($M)', d.sc.rev, '$M'], ['SC Pipeline ($M)', d.sc.pipe, '$M'],
      ['SC Customers', d.sc.cust, ''], ['SC Thought Leadership', d.sc.thought, '']
    ];
    scMetrics.forEach(([name, val, unit]) => {
      const t = tgt(name);
      lines.push(`  ${name}: ${fmt(val, unit)}${t != null ? ` | Target ${fmt(t, unit)}` : ''}`);
    });
    lines.push('');

    // Deals
    if (d.deals && d.deals.length) {
      lines.push('### Closed Deals (YTD)');
      d.deals.forEach(dl => {
        lines.push(`  ${dl.Client} | ${dl.Type} | ${dl.Scope} | $${(dl['ACV ($M)'] || 0).toFixed(2)}M ACV | ${dl.Month}`);
      });
      lines.push('');
    }

    // Pipeline
    if (DATA.pipeline && DATA.pipeline.length) {
      lines.push('### Active Pipeline');
      DATA.pipeline.forEach(p => {
        lines.push(`  ${p.Client} | ${p.Scope} | ACV $${(p['ACV ($M)'] || 0).toFixed(1)}M | Weighted $${(p['Weighted ACV ($M)'] || 0).toFixed(1)}M | Prob ${p.Probability || '—'}`);
      });
      lines.push('');
    }

    // Bonus
    if (DATA.bonus && DATA.bonus.length) {
      lines.push('### Bonus Opportunities');
      DATA.bonus.forEach(b => {
        lines.push(`  ${b.Client} | Potential $${(b.bonus || b['Estimated Bonus ($M)'] || 0).toFixed(1)}M | Prob ${b.Probability || '—'}`);
      });
    }

    return lines.join('\n');
  }

  // --- Markdown → HTML (minimal) ---
  function mdToHtml(text) {
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/^### (.+)$/gm,'<strong>$1</strong>')
      .replace(/^## (.+)$/gm,'<strong>$1</strong>')
      .replace(/^- (.+)$/gm,'<li>$1</li>')
      .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
      .replace(/\n\n/g,'</p><p>')
      .replace(/\n/g,'<br>')
      .replace(/^(.+)$/, '<p>$1</p>');
  }

  // --- Chat history ---
  const history = [];

  function appendMsg(role, html, streaming = false) {
    const div = document.createElement('div');
    div.className = `agent-msg ${role === 'user' ? 'user' : 'bot'}`;
    const initial = role === 'user'
      ? `<div class="agent-msg-avatar">You</div><div class="agent-msg-bubble">${html}</div>`
      : `<div class="agent-msg-avatar">AI</div><div class="agent-msg-bubble" id="streamBubble">${html}</div>`;
    div.innerHTML = initial;
    // Remove welcome message on first real message
    const welcome = document.getElementById('agentWelcome');
    if (welcome) welcome.remove();
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'agent-msg bot';
    div.id = 'agentTyping';
    div.innerHTML = `<div class="agent-msg-avatar">AI</div>
      <div class="agent-msg-bubble"><div class="agent-typing"><span></span><span></span><span></span></div></div>`;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('agentTyping');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    if (!apiKey) {
      appendMsg('bot', '⚠️ Please enter your Claude API key above to enable the AI agent.');
      return;
    }

    const ctx = buildContext();
    if (!ctx) {
      appendMsg('bot', '⚠️ No dashboard data loaded. Please load your Excel file first, then ask your question.');
      return;
    }

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    statusEl.textContent = 'Thinking...';

    appendMsg('user', mdToHtml(text));
    history.push({ role: 'user', content: text });

    showTyping();

    const systemPrompt = `You are Aether, an expert FP&A analytics agent for GEP Services. You have full access to the FY2025 dashboard data below. Answer questions concisely and accurately based only on the data provided. Use $ and % formatting. Highlight gaps, risks, and performance vs targets. When comparing to targets, indicate if ON TRACK (≥95%), AT RISK (85-94%), or BEHIND (<85%). For "lower is better" metrics like attrition, reverse the logic.

DASHBOARD DATA:
${ctx}`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-allow-browser': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1024,
          system: systemPrompt,
          messages: history.slice(-10) // keep last 10 turns for context
        })
      });

      removeTyping();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        const msg = err?.error?.message || `API error ${res.status}`;
        appendMsg('bot', `⚠️ ${msg}`);
        history.pop();
        statusEl.textContent = 'Ask me anything about your dashboard';
        sendBtn.disabled = false;
        return;
      }

      const data = await res.json();
      const reply = data.content?.[0]?.text || '(no response)';
      history.push({ role: 'assistant', content: reply });

      // Render with simple markdown
      const bubble = appendMsg('bot', '');
      const bubbleEl = bubble.querySelector('.agent-msg-bubble');
      bubbleEl.innerHTML = renderMarkdown(reply);
      messages.scrollTop = messages.scrollHeight;

    } catch (e) {
      removeTyping();
      appendMsg('bot', `⚠️ Network error: ${e.message}`);
      history.pop();
    }

    statusEl.textContent = 'Ask me anything about your dashboard';
    sendBtn.disabled = false;
    input.focus();
  }

  function renderMarkdown(text) {
    // Tables
    text = text.replace(/\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)+)/g, (_, header, rows) => {
      const ths = header.split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
      const trs = rows.trim().split('\n').map(row => {
        const tds = row.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('');
        return `<tr>${tds}</tr>`;
      }).join('');
      return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
    });
    // Bold & italic
    text = text.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
    text = text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    text = text.replace(/\*(.+?)\*/g,'<em>$1</em>');
    // Headers
    text = text.replace(/^### (.+)$/gm,'<p><strong>$1</strong></p>');
    text = text.replace(/^## (.+)$/gm,'<p><strong>$1</strong></p>');
    text = text.replace(/^# (.+)$/gm,'<p><strong>$1</strong></p>');
    // Lists
    text = text.replace(/^[-*] (.+)$/gm,'<li>$1</li>');
    text = text.replace(/(<li>[\s\S]+?<\/li>)/g,'<ul>$1</ul>');
    text = text.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
    // Paragraphs
    const parts = text.split(/\n{2,}/);
    return parts.map(p => {
      if (p.startsWith('<')) return p;
      return `<p>${p.replace(/\n/g,'<br>')}</p>`;
    }).join('');
  }

})();
</script>
